type: object
required:
  - id
  - name
  - type
  - coordinates
  - createdAt
  - updatedAt
properties:
  id:
    type: string
    format: uuid
    description: Unique identifier for the route
  name:
    type: string
    description: Display name of the route
  type:
    type: string
    description: Route type (e.g. line, polygon)
  coordinates:
    type: array
    description: GeoJSON-style coordinates for the route
    items: {}
  createdAt:
    type: string
    format: date-time
    description: When the route was created
  updatedAt:
    type: string
    format: date-time
    description: When the route was last updated
