GetRoutePreviewResponse:
  type: array
  description: List of page previews for the route (e.g. Ropewiki pages linked to the route)
  items:
    $ref: "#/PagePreview"

PagePreview:
  type: object
  description: Preview of a page linked to a route (id, source, banner image, rating, title, regions, difficulty, permit, mapData, externalLink)
  required:
    - id
    - source
    - title
    - regions
    - difficulty
    - previewType
  properties:
    id:
      type: string
      format: uuid
      description: Page identifier (e.g. RopewikiPage id)
    source:
      type: string
      description: Source of the page (e.g. ropewiki)
      enum:
        - ropewiki
    imageUrl:
      type: string
      format: uri
      nullable: true
      description: Banner image URL (e.g. first non–beta-section image for Ropewiki)
    rating:
      type: number
      format: float
      nullable: true
      description: Numeric rating (e.g. quality for Ropewiki)
    ratingCount:
      type: integer
      nullable: true
      description: Number of votes (e.g. userVotes for Ropewiki)
    title:
      type: string
      description: Display title of the page
    regions:
      type: array
      description: Region names (not ids) the page belongs to, in ascending order of depth (smallest to largest regions; e.g. specific area first, then parent region, then root)
      items:
        type: string
    difficulty:
      $ref: "#/Difficulty"
    permit:
      type: string
      nullable: true
      description: Permit requirement for the page
      enum:
        - Yes
        - No
        - Restricted
        - Closed
        - null
    mapData:
      type: string
      format: uuid
      nullable: true
      description: Map data id for the page route, or null if none
    externalLink:
      type: string
      format: uri
      nullable: true
      description: External link to the page (e.g. Ropewiki page URL)
    previewType:
      type: string
      description: Discriminator for the preview type; always "page" for PagePreview
      enum:
        - page

Difficulty:
  type: object
  description: Difficulty ratings (technical, water, time, risk); each property nullable
  required:
    - technical
    - water
    - time
    - risk
  properties:
    technical:
      type: string
      nullable: true
      description: Technical difficulty (1-4)
      enum:
        - "1"
        - "2"
        - "3"
        - "4"
        - null
    water:
      type: string
      nullable: true
      description: Water difficulty (A, B, C, C1-C4)
      enum:
        - A
        - B
        - C
        - C1
        - C2
        - C3
        - C4
        - null
    time:
      type: string
      nullable: true
      description: Time difficulty (I-VI, Roman numerals)
      enum:
        - I
        - II
        - III
        - IV
        - V
        - VI
        - null
    risk:
      type: string
      nullable: true
      description: Risk rating (G, PG, PG13, R, X, XX)
      enum:
        - G
        - PG
        - PG13
        - R
        - X
        - XX
        - null
