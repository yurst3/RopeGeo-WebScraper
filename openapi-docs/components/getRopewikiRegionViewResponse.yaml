GetRopewikiRegionViewResponse:
  type: object
  description: Result wrapper for getRopewikiRegionView (ropegeo-common Result; resultType + result)
  required:
    - resultType
    - result
  properties:
    resultType:
      type: string
      enum:
        - ropewikiRegionView
      description: Discriminator for single-result API responses (ropegeo-common ResultType)
    result:
      $ref: "#/RopewikiRegionView"
      description: The RopewikiRegionView payload

RopewikiRegionView:
  type: object
  description: Region view for GET /ropewiki/region/{id} (RopewikiRegionView from ropegeo-common)
  required:
    - name
    - regions
    - regionCount
    - topLevelPageCount
    - pageCount
    - totalPageCount
    - overview
    - bestMonths
    - isMajorRegion
    - latestRevisionDate
    - syncDate
    - externalLink
    - miniMap
  properties:
    name:
      type: string
      description: Region name
    regions:
      type: array
      description: Full lineage of parent regions from immediate parent up to root (same shape as RopewikiPageView.regions)
      items:
        type: object
        required:
          - id
          - name
        properties:
          id:
            type: string
            format: uuid
            description: Region uuid
          name:
            type: string
            description: Region name
    regionCount:
      type: integer
      description: Number of descendant regions (trueRegionCount)
    topLevelPageCount:
      type: integer
      description: Pages in this region only (truePageCount)
    pageCount:
      type: integer
      description: Raw page count from source (rawPageCount)
    totalPageCount:
      type: integer
      description: Pages in this region and all descendants (truePageCountWithDescendents)
    overview:
      oneOf:
        - $ref: "./getRopewikiPageViewResponse.yaml#/BetaSection"
        - enum: [null]
      description: Region overview as a beta section (title, text, images, etc.), or null
    bestMonths:
      type: array
      items:
        type: string
      description: Best months to visit
    isMajorRegion:
      type: boolean
      description: Whether the region is marked as major
    latestRevisionDate:
      type: string
      format: date-time
      description: Last revision date
    syncDate:
      type: string
      format: date-time
      description: When the region was last synced (updatedAt)
    externalLink:
      type: string
      format: uri
      description: External URL for the region
    miniMap:
      $ref: './miniMap.yaml#/RegionMiniMap'
      description: Region minimap — clients call GET /routes with routesParams for markers and GET /ropewiki/region/{id}/bounds for fitting the map (bounds are not on the routes GeoJSON)
