GetRoutesResponse:
  type: object
  description: Result wrapper for getRoutes (ropegeo-common Result; resultType + result)
  required:
    - resultType
    - result
  properties:
    resultType:
      type: string
      enum:
        - routesGeojson
      description: Discriminator for single-result API responses (ropegeo-common ResultType)
    result:
      $ref: "#/RoutesGeojsonResult"
      description: The GeoJSON Feature Collection of routes (RoutesGeojson)

RoutesGeojsonResult:
  type: object
  description: GeoJSON Feature Collection of routes; each feature has id, name, and type properties and a Point geometry.
  required:
    - type
    - features
  properties:
    type:
      type: string
      enum:
        - FeatureCollection
      description: GeoJSON type identifier for a Feature Collection
    features:
      type: array
      description: List of GeoJSON Feature objects, one per route
      items:
        $ref: "#/GeoJsonFeature"

GeoJsonFeature:
  type: object
  description: A single GeoJSON Feature with a Point geometry and route properties
  required:
    - type
    - geometry
    - properties
  properties:
    type:
      type: string
      enum:
        - Feature
      description: GeoJSON type identifier for a Feature
    geometry:
      $ref: "#/GeoJsonPoint"
    properties:
      $ref: "#/GeoJsonFeatureProperties"

GeoJsonPoint:
  type: object
  description: GeoJSON Point geometry (RFC 7946); coordinates are [longitude, latitude]
  required:
    - type
    - coordinates
  properties:
    type:
      type: string
      enum:
        - Point
      description: GeoJSON geometry type
    coordinates:
      type: array
      minItems: 2
      maxItems: 2
      items:
        type: number
        format: float
      description: "[longitude, latitude] in WGS84"

GeoJsonFeatureProperties:
  type: object
  description: Properties of a route feature (id, name, type)
  required:
    - id
    - name
    - type
  properties:
    id:
      type: string
      format: uuid
      description: Unique identifier for the route
    name:
      type: string
      description: Display name of the route
    type:
      type: string
      description: Route type
      enum:
        - Unknown
        - POI
        - Cave
        - Canyon
