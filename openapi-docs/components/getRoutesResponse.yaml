GetRoutesResponse:
  type: object
  description: Page-based GET /routes response (ropegeo-common RouteResult; resultType `route`, GeoJSON features, total count, page index)
  required:
    - resultType
    - results
    - total
    - page
  properties:
    resultType:
      type: string
      enum:
        - route
      description: Discriminator for page-based route list (ropegeo-common PaginationResultType.Route)
    results:
      type: array
      description: GeoJSON Feature objects for this page (one per route row)
      items:
        $ref: "#/GeoJsonFeature"
    total:
      type: integer
      minimum: 0
      description: Total number of routes matching the query across all pages
    page:
      type: integer
      minimum: 1
      description: Current 1-based page index

GeoJsonFeature:
  type: object
  description: A single GeoJSON Feature with a Point geometry and route properties
  required:
    - type
    - geometry
    - properties
  properties:
    type:
      type: string
      enum:
        - Feature
      description: GeoJSON type identifier for a Feature
    geometry:
      $ref: "#/GeoJsonPoint"
    properties:
      $ref: "#/GeoJsonFeatureProperties"

GeoJsonPoint:
  type: object
  description: GeoJSON Point geometry (RFC 7946); coordinates are [longitude, latitude]
  required:
    - type
    - coordinates
  properties:
    type:
      type: string
      enum:
        - Point
      description: GeoJSON geometry type
    coordinates:
      type: array
      minItems: 2
      maxItems: 2
      items:
        type: number
        format: float
      description: "[longitude, latitude] in WGS84"

GeoJsonFeatureProperties:
  type: object
  description: Properties of a route feature (id, name, type)
  required:
    - id
    - name
    - type
  properties:
    id:
      type: string
      format: uuid
      description: Unique identifier for the route
    name:
      type: string
      description: Display name of the route
    type:
      type: string
      description: Route type
      enum:
        - Unknown
        - POI
        - Cave
        - Canyon
