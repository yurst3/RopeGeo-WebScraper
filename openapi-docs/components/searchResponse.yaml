SearchResponse:
  type: object
  description: Response body for the search endpoint (SearchResults from ropegeo-common); contains results and nextCursor for pagination.
  required:
    - results
    - nextCursor
  properties:
    results:
      type: array
      description: List of page and region previews, ordered by similarity or quality
      items:
        oneOf:
          - $ref: './getRoutePreviewResponse.yaml#/PagePreview'
          - $ref: '#/RegionPreview'
    nextCursor:
      type: string
      nullable: true
      description: Base64url-encoded cursor for the next page; null when there are no more results

RegionPreview:
  type: object
  description: Preview of a region (id, name, parents, pageCount, regionCount, imageUrl, source)
  required:
    - id
    - name
    - parents
    - pageCount
    - regionCount
    - previewType
    - source
  properties:
    id:
      type: string
      format: uuid
      description: Unique identifier for the region
    name:
      type: string
      description: Display name of the region
    parents:
      type: array
      description: Parent region names from immediate parent to root
      items:
        type: string
    pageCount:
      type: integer
      description: Number of pages in this region and all descendant regions (truePageCountWithDescendents)
    regionCount:
      type: integer
      description: Number of direct child regions (trueRegionCount)
    previewType:
      type: string
      description: Discriminator for the preview type; always "region" for RegionPreview
      enum:
        - region
    imageUrl:
      type: string
      format: uri
      nullable: true
      description: Optional image URL for the region (null for Ropewiki)
    source:
      type: string
      description: Source of the region (e.g. ropewiki)
      enum:
        - ropewiki
