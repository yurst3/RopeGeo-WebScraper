# Shared minimap types (ropegeo-common PageMiniMap, RegionMiniMap, RoutesParams, Bounds)

Bounds:
  type: object
  description: Geographic bounding box for map tile content
  required:
    - north
    - south
    - east
    - west
  properties:
    north:
      type: number
      description: Northern latitude
    south:
      type: number
      description: Southern latitude
    east:
      type: number
      description: Eastern longitude
    west:
      type: number
      description: Western longitude

RoutesParamsRegion:
  type: object
  description: Scoped region filter (ropegeo-common RoutesParams.region)
  required:
    - source
    - id
  properties:
    source:
      type: string
      enum:
        - ropewiki
      description: Page data source
    id:
      type: string
      format: uuid
      description: RopewikiRegion id (includes descendant routes)

RoutesParams:
  type: object
  description: |
    ropegeo-common RoutesParams JSON shape (RegionMiniMap.routesParams).
    Region minimap uses nested **region** with a single **source** string; **sources** is for global listings only and must not be set together with **region**.
  required:
    - region
  properties:
    region:
      $ref: '#/RoutesParamsRegion'
    sources:
      type: array
      nullable: true
      description: Global source allow-list (omit or null when **region** is set)
      items:
        type: string
        enum:
          - ropewiki
    routeTypes:
      type: array
      description: Optional allow-list of `Route.type` values (ropegeo-common `RoutesParams.routeTypes`)
      items:
        type: string
        description: Route classification
        enum:
          - Unknown
          - POI
          - Cave
          - Canyon

PageMiniMap:
  type: object
  description: Page minimap — vector tile template + bounds (ropegeo-common PageMiniMap)
  required:
    - miniMapType
    - title
    - layerId
    - tilesTemplate
    - bounds
  properties:
    miniMapType:
      type: string
      enum:
        - tilesTemplate
    title:
      type: string
      description: Display title (linked Route.name)
    layerId:
      type: string
      description: Layer / map data identifier for the tile set
    tilesTemplate:
      type: string
      description: Tile URL template with {z}, {x}, and {y} placeholders
    bounds:
      $ref: '#/Bounds'

RegionMiniMap:
  type: object
  description: Region minimap — load route features via GET /routes with routesParams; bbox is miniMap.bounds (null when no coordinates in subtree) (ropegeo-common RegionMiniMap)
  required:
    - miniMapType
    - title
    - bounds
    - routesParams
  properties:
    miniMapType:
      type: string
      enum:
        - geojson
    title:
      type: string
      description: Region display name
    bounds:
      type: object
      nullable: true
      description: Bounding box over route coordinates in the region subtree, or null when none
      allOf:
        - $ref: '#/Bounds'
    routesParams:
      $ref: '#/RoutesParams'

CenteredRegionMiniMap:
  type: object
  description: Page minimap fallback — centered route over GET /routes with region-scoped routesParams (ropegeo-common CenteredRegionMiniMap)
  required:
    - miniMapType
    - title
    - routesParams
    - centeredRouteId
  properties:
    miniMapType:
      type: string
      enum:
        - centeredGeojson
    title:
      type: string
      description: Linked Route.name
    routesParams:
      $ref: '#/RoutesParams'
    centeredRouteId:
      type: string
      format: uuid
      description: Route id to emphasize when fitting the map
