# Shared minimap types (ropegeo-common OnlinePageMiniMap, OnlineRegionMiniMap, OnlineCenteredRegionMiniMap, RoutesParams, Bounds)

Bounds:
  type: object
  description: Geographic bounding box for map tile content
  required:
    - north
    - south
    - east
    - west
  properties:
    north:
      type: number
      description: Northern latitude
    south:
      type: number
      description: Southern latitude
    east:
      type: number
      description: Eastern longitude
    west:
      type: number
      description: Western longitude

RoutesParamsRegion:
  type: object
  description: Scoped region filter (ropegeo-common RoutesParams.region)
  required:
    - source
    - id
  properties:
    source:
      type: string
      enum:
        - ropewiki
      description: Page data source
    id:
      type: string
      format: uuid
      description: RopewikiRegion id (includes descendant routes)

RoutesParams:
  type: object
  description: |
    ropegeo-common RoutesParams JSON shape (e.g. OnlineRegionMiniMap.routesParams, OnlineCenteredRegionMiniMap.routesParams).
    Region-scoped minimaps use nested **region** with a single **source** string; **sources** is for global listings only and must not be set together with **region**.
  required:
    - region
  properties:
    region:
      $ref: '#/RoutesParamsRegion'
    sources:
      type: array
      nullable: true
      description: Global source allow-list (omit or null when **region** is set)
      items:
        type: string
        enum:
          - ropewiki
    routeTypes:
      type: array
      description: Optional allow-list of `Route.type` values (ropegeo-common `RoutesParams.routeTypes`)
      items:
        type: string
        description: Route classification
        enum:
          - Unknown
          - POI
          - Cave
          - Canyon

PageMiniMap:
  type: object
  description: Online page minimap — vector tile template + bounds (ropegeo-common OnlinePageMiniMap)
  required:
    - miniMapType
    - fetchType
    - title
    - polyLineLayerId
    - pointLayerId
    - onlineTilesTemplate
    - bounds
    - tileCount
    - tileTotalBytes
  properties:
    miniMapType:
      type: string
      enum:
        - page
    fetchType:
      type: string
      enum:
        - online
    title:
      type: string
      description: Display title (linked Route.name)
    polyLineLayerId:
      type: string
      description: MVT source-layer name for line and polygon features (server uses `PolyLines`)
    pointLayerId:
      type: string
      description: MVT source-layer name for point and multipoint features (server uses `Points`)
    onlineTilesTemplate:
      type: string
      description: Tile URL template with {z}, {x}, and {y} placeholders
    bounds:
      $ref: '#/Bounds'
    tileCount:
      type: integer
      minimum: 0
      description: Number of `.pbf` tile objects for this page's map data
    tileTotalBytes:
      type: integer
      minimum: 0
      description: Total byte size of all `.pbf` tiles for this page's map data
    mapDataId:
      type: string
      format: uuid
      nullable: true
      description: MapData record id for this page's vector tile set
    legend:
      type: object
      nullable: true
      description: |
        Optional keyed legend entries for vector layers (ropegeo-common `PageMiniMap.legend`); values use `featureType` `point`, `line`, or `polygon` with type-specific fields.
      additionalProperties:
        $ref: '#/LegendItem'

LegendItem:
  type: object
  description: Discriminated legend entry (ropegeo-common LegendItem wire shape)
  required:
    - featureType
    - id
    - name
  properties:
    featureType:
      type: string
      enum:
        - point
        - line
        - polygon
      description: Geometry kind for this legend row
    id:
      type: string
      description: Stable id for the legend entry (matches object key when produced by the server)
    name:
      type: string
      description: Display label
    coordinates:
      type: object
      description: Point position (WGS84) when featureType is point
      required:
        - lat
        - lon
      properties:
        lat:
          type: number
        lon:
          type: number
    icon:
      type: string
      nullable: true
      description: Optional icon hint for point entries
    bounds:
      $ref: '#/Bounds'
      description: Bounding box for line or polygon entries
    strokeColor:
      type: string
      nullable: true
      description: Line stroke color when featureType is line
    strokeWidth:
      type: string
      nullable: true
      description: Line stroke width when featureType is line
    borderColor:
      type: string
      nullable: true
      description: Polygon outline color when featureType is polygon
    fillColor:
      type: string
      nullable: true
      description: Polygon fill color when featureType is polygon
    relevantContext:
      $ref: '#/RelevantContext'
      nullable: true
      description: Optional AI-inferred context linking this legend item to page measurements, beta excerpts, and images

RelevantContext:
  type: object
  description: Relevant page content for a legend item (ropegeo-common RelevantContext)
  properties:
    measurements:
      type: array
      nullable: true
      description: Relevant page stat measurements for this legend item
      items:
        $ref: '#/MeasurementContext'
    betaSectionExcerpts:
      type: object
      nullable: true
      description: Beta section excerpts keyed by beta section id
      additionalProperties:
        type: array
        items:
          $ref: '#/BetaSectionExcerpt'
    images:
      type: object
      nullable: true
      description: Relevant captioned images keyed by beta section id (empty string for page-level images)
      additionalProperties:
        type: array
        items:
          $ref: '#/ImageContext'

MeasurementContext:
  type: object
  description: A labeled measurement with confidence (ropegeo-common MeasurementContext)
  required:
    - label
    - measurement
    - confidence
  properties:
    label:
      type: string
      description: Page stat key (e.g. exitElevGain, shuttleTime)
    measurement:
      type: object
      description: Length or time measurement wire shape
    confidence:
      type: number
      minimum: 0
      maximum: 1
      description: Model confidence from 0 to 1

BetaSectionExcerpt:
  type: object
  description: Verbatim beta excerpt with optional offsets (ropegeo-common BetaSectionExcerpt)
  required:
    - confidence
  properties:
    text:
      type: string
      nullable: true
      description: Verbatim excerpt text from the beta section
    start:
      type: integer
      nullable: true
      minimum: 0
      description: Character offset in beta section text where excerpt starts
    end:
      type: integer
      nullable: true
      minimum: 0
      description: Character offset in beta section text where excerpt ends (exclusive)
    confidence:
      type: number
      minimum: 0
      maximum: 1
      description: Model confidence from 0 to 1

ImageContext:
  type: object
  description: Relevant captioned image reference (ropegeo-common ImageContext)
  required:
    - id
    - confidence
  properties:
    id:
      type: string
      format: uuid
      description: RopewikiImage id
    confidence:
      type: number
      minimum: 0
      maximum: 1
      description: Model confidence from 0 to 1

OnlineRegionMiniMap:
  type: object
  description: Online region minimap — load route features via GET /routes with routesParams; bbox is miniMap.bounds (null when no coordinates in subtree) (ropegeo-common OnlineRegionMiniMap)
  required:
    - miniMapType
    - fetchType
    - title
    - bounds
    - routesParams
    - routeCount
    - totalBytes
  properties:
    miniMapType:
      type: string
      enum:
        - region
    fetchType:
      type: string
      enum:
        - online
    title:
      type: string
      description: Region display name
    bounds:
      type: object
      nullable: true
      description: Bounding box over route coordinates in the region subtree, or null when none
      allOf:
        - $ref: '#/Bounds'
    routesParams:
      $ref: '#/RoutesParams'
    routeCount:
      type: integer
      minimum: 0
      description: Routes matching routesParams in the region subtree
    totalBytes:
      type: integer
      minimum: 0
      description: Sum of serialized route coordinate payload bytes for matching routes

OnlineCenteredRegionMiniMap:
  type: object
  description: Online page minimap fallback — centered route over GET /routes with region-scoped routesParams (ropegeo-common OnlineCenteredRegionMiniMap)
  required:
    - miniMapType
    - fetchType
    - title
    - routesParams
    - centeredRouteId
    - routeCount
    - totalBytes
  properties:
    miniMapType:
      type: string
      enum:
        - centeredRegion
    fetchType:
      type: string
      enum:
        - online
    title:
      type: string
      description: Linked Route.name
    routesParams:
      $ref: '#/RoutesParams'
    centeredRouteId:
      type: string
      format: uuid
      description: Route id to emphasize when fitting the map
    routeCount:
      type: integer
      minimum: 0
      description: Routes matching routesParams in the region subtree
    totalBytes:
      type: integer
      minimum: 0
      description: Sum of serialized route coordinate payload bytes for matching routes
