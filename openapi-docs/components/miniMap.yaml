# Shared minimap types (ropegeo-common OnlinePageMiniMap, OnlineRegionMiniMap, OnlineCenteredRegionMiniMap, RoutesParams, Bounds)

Bounds:
  type: object
  description: Geographic bounding box for map tile content
  required:
    - north
    - south
    - east
    - west
  properties:
    north:
      type: number
      description: Northern latitude
    south:
      type: number
      description: Southern latitude
    east:
      type: number
      description: Eastern longitude
    west:
      type: number
      description: Western longitude

RoutesParamsRegion:
  type: object
  description: Scoped region filter (ropegeo-common RoutesParams.region)
  required:
    - source
    - id
  properties:
    source:
      type: string
      enum:
        - ropewiki
      description: Page data source
    id:
      type: string
      format: uuid
      description: RopewikiRegion id (includes descendant routes)

RoutesParams:
  type: object
  description: |
    ropegeo-common RoutesParams JSON shape (e.g. OnlineRegionMiniMap.routesParams, OnlineCenteredRegionMiniMap.routesParams).
    Region-scoped minimaps use nested **region** with a single **source** string; **sources** is for global listings only and must not be set together with **region**.
  required:
    - region
  properties:
    region:
      $ref: '#/RoutesParamsRegion'
    sources:
      type: array
      nullable: true
      description: Global source allow-list (omit or null when **region** is set)
      items:
        type: string
        enum:
          - ropewiki
    routeTypes:
      type: array
      description: Optional allow-list of `Route.type` values (ropegeo-common `RoutesParams.routeTypes`)
      items:
        type: string
        description: Route classification
        enum:
          - Unknown
          - POI
          - Cave
          - Canyon

PageMiniMap:
  type: object
  description: Online page minimap — vector tile template + bounds (ropegeo-common OnlinePageMiniMap)
  required:
    - miniMapType
    - fetchType
    - title
    - polyLineLayerId
    - pointLayerId
    - onlineTilesTemplate
    - bounds
  properties:
    miniMapType:
      type: string
      enum:
        - page
    fetchType:
      type: string
      enum:
        - online
    title:
      type: string
      description: Display title (linked Route.name)
    polyLineLayerId:
      type: string
      description: MVT source-layer name for line and polygon features (server uses `PolyLines`)
    pointLayerId:
      type: string
      description: MVT source-layer name for point and multipoint features (server uses `Points`)
    onlineTilesTemplate:
      type: string
      description: Tile URL template with {z}, {x}, and {y} placeholders
    bounds:
      $ref: '#/Bounds'
    legend:
      type: object
      nullable: true
      description: |
        Optional keyed legend entries for vector layers (ropegeo-common `PageMiniMap.legend`); values use `featureType` `point`, `line`, or `polygon` with type-specific fields.
      additionalProperties:
        $ref: '#/LegendItem'

LegendItem:
  type: object
  description: Discriminated legend entry (ropegeo-common LegendItem wire shape)
  required:
    - featureType
    - id
    - name
  properties:
    featureType:
      type: string
      enum:
        - point
        - line
        - polygon
      description: Geometry kind for this legend row
    id:
      type: string
      description: Stable id for the legend entry (matches object key when produced by the server)
    name:
      type: string
      description: Display label
    coordinates:
      type: object
      description: Point position (WGS84) when featureType is point
      required:
        - lat
        - lon
      properties:
        lat:
          type: number
        lon:
          type: number
    icon:
      type: string
      nullable: true
      description: Optional icon hint for point entries
    bounds:
      $ref: '#/Bounds'
      description: Bounding box for line or polygon entries
    strokeColor:
      type: string
      nullable: true
      description: Line stroke color when featureType is line
    strokeWidth:
      type: string
      nullable: true
      description: Line stroke width when featureType is line
    borderColor:
      type: string
      nullable: true
      description: Polygon outline color when featureType is polygon
    fillColor:
      type: string
      nullable: true
      description: Polygon fill color when featureType is polygon

OnlineRegionMiniMap:
  type: object
  description: Online region minimap — load route features via GET /routes with routesParams; bbox is miniMap.bounds (null when no coordinates in subtree) (ropegeo-common OnlineRegionMiniMap)
  required:
    - miniMapType
    - fetchType
    - title
    - bounds
    - routesParams
  properties:
    miniMapType:
      type: string
      enum:
        - region
    fetchType:
      type: string
      enum:
        - online
    title:
      type: string
      description: Region display name
    bounds:
      type: object
      nullable: true
      description: Bounding box over route coordinates in the region subtree, or null when none
      allOf:
        - $ref: '#/Bounds'
    routesParams:
      $ref: '#/RoutesParams'

OnlineCenteredRegionMiniMap:
  type: object
  description: Online page minimap fallback — centered route over GET /routes with region-scoped routesParams (ropegeo-common OnlineCenteredRegionMiniMap)
  required:
    - miniMapType
    - fetchType
    - title
    - routesParams
    - centeredRouteId
  properties:
    miniMapType:
      type: string
      enum:
        - centeredRegion
    fetchType:
      type: string
      enum:
        - online
    title:
      type: string
      description: Linked Route.name
    routesParams:
      $ref: '#/RoutesParams'
    centeredRouteId:
      type: string
      format: uuid
      description: Route id to emphasize when fitting the map
