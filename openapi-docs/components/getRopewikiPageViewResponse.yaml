GetRopewikiPageViewResponse:
  type: object
  description: Result wrapper for getRopewikiPageView (ropegeo-common Result; resultType + result)
  required:
    - resultType
    - result
  properties:
    resultType:
      type: string
      enum:
        - ropewikiPageView
      description: Discriminator for single-result API responses (ropegeo-common ResultType)
    result:
      $ref: "#/RopewikiPageView"
      description: The RopewikiPageView payload

RopewikiPageView:
  type: object
  description: Full view of a Ropewiki page (GET /ropewiki/page/{id}). The page is identified by the path parameter `id` (RopewikiPage uuid); the response does not repeat an external Ropewiki page id string.
  required:
    - name
    - aka
    - url
    - quality
    - userVotes
    - difficulty
    - regions
    - months
    - latestRevisionDate
    - betaSections
  properties:
    name:
      type: string
      description: Page name
    aka:
      type: array
      items:
        type: string
      description: Also-known-as names
    url:
      type: string
      format: uri
      description: Page URL
    quality:
      type: number
      format: float
      description: Quality rating
    userVotes:
      type: integer
      description: Number of votes
    difficulty:
      $ref: "./getRoutePreviewResponse.yaml#/Difficulty"
    permit:
      type: string
      nullable: true
      description: Permit status (Yes, No, Restricted, Closed, or null)
      enum:
        - Yes
        - No
        - Restricted
        - Closed
        - null
    rappelCount:
      description: Rappel count; either a single number, or min/max object when parsed from rappelInfo (e.g. "4-6r")
      oneOf:
        - type: integer
        - type: object
          properties:
            min:
              type: integer
            max:
              type: integer
        - enum: [null]
    jumps:
      type: integer
      nullable: true
      description: Number of jumps parsed from rappelInfo (e.g. "+j" = 1, "+2j" = 2)
    vehicle:
      type: string
      nullable: true
      description: Vehicle requirement
    rappelLongest:
      type: number
      nullable: true
      description: Longest rappel (numeric value)
    shuttleTime:
      type: number
      nullable: true
      description: Shuttle time (numeric value)
    overallTime:
      description: Overall time; either a single number, or min/max object
      oneOf:
        - type: number
        - type: object
          properties:
            min:
              type: number
            max:
              type: number
        - enum: [null]
    overallLength:
      type: number
      nullable: true
      description: Total canyon/hike length (numeric value, e.g. miles)
    approachLength:
      type: number
      nullable: true
      description: Approach segment length (numeric value)
    approachElevGain:
      type: number
      nullable: true
      description: Approach elevation gain (numeric value)
    descentLength:
      type: number
      nullable: true
      description: Descent segment length (numeric value)
    descentElevGain:
      type: number
      nullable: true
      description: Descent elevation gain (numeric value, typically negative)
    exitLength:
      type: number
      nullable: true
      description: Exit segment length (numeric value)
    exitElevGain:
      type: number
      nullable: true
      description: Exit elevation gain (numeric value)
    approachTime:
      description: Approach time; either a single number, or min/max object
      oneOf:
        - type: number
        - type: object
          properties:
            min:
              type: number
            max:
              type: number
        - enum: [null]
    descentTime:
      description: Descent time; either a single number, or min/max object
      oneOf:
        - type: number
        - type: object
          properties:
            min:
              type: number
            max:
              type: number
        - enum: [null]
    exitTime:
      description: Exit time; either a single number, or min/max object
      oneOf:
        - type: number
        - type: object
          properties:
            min:
              type: number
            max:
              type: number
        - enum: [null]
    months:
      type: array
      items:
        type: string
      description: Best months (e.g. Jun, Jul)
    regions:
      type: array
      description: Region lineage (leaf to root), with id and name for each region
      items:
        type: object
        required:
          - id
          - name
        properties:
          id:
            type: string
            format: uuid
            description: RopewikiRegion id
          name:
            type: string
            description: Region name
    latestRevisionDate:
      type: string
      format: date-time
      description: Last revision date
    bannerImage:
      $ref: "#/BetaSectionImage"
      nullable: true
      description: Banner image (first non–beta-section image)
    betaSections:
      type: array
      items:
        $ref: "#/BetaSection"
      description: Beta sections with text and images
    miniMap:
      description: Page minimap (tiles + bounds) when MapData has a non-empty layer id, tile template, and valid bounds; otherwise null
      nullable: true
      $ref: './miniMap.yaml#/PageMiniMap'

BetaSectionImage:
  type: object
  description: Image view (banner or beta-section image)
  required:
    - order
    - id
    - bannerUrl
    - fullUrl
    - linkUrl
    - caption
    - latestRevisionDate
    - downloadBytes
  properties:
    order:
      type: integer
    id:
      type: string
      format: uuid
      description: RopewikiImage row id (stable key for offline image maps)
    bannerUrl:
      type: string
      format: uri
      nullable: true
      description: Banner image URL when available from processed image data; otherwise null.
    fullUrl:
      type: string
      format: uri
      nullable: true
      description: Full-size image URL when available from processed image data; otherwise null.
    linkUrl:
      type: string
      format: uri
      description: Link URL
    caption:
      type: string
      nullable: true
    latestRevisionDate:
      type: string
      format: date-time
    downloadBytes:
      description: Approximate byte sizes per rendition from processed image metadata (null when no ImageData is linked); banner row includes preview/banner/full; beta-section images use preview 0 and banner/full only
      $ref: '#/DownloadBytes'
      nullable: true

DownloadBytes:
  type: object
  description: Byte sizes for preview, banner, and full renditions (approximate, from stored sizeKB in metadata)
  required:
    - preview
    - banner
    - full
  properties:
    preview:
      type: number
      minimum: 0
      description: Approximate byte size for the preview rendition
    banner:
      type: number
      minimum: 0
      description: Approximate byte size for the banner rendition
    full:
      type: number
      minimum: 0
      description: Approximate byte size for the full rendition

BetaSection:
  type: object
  description: Beta section with title, text, and images
  required:
    - order
    - title
    - text
    - images
    - latestRevisionDate
  properties:
    order:
      type: integer
    title:
      type: string
    text:
      type: string
    images:
      type: array
      items:
        $ref: "#/BetaSectionImage"
    latestRevisionDate:
      type: string
      format: date-time
