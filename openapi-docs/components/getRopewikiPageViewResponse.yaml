GetRopewikiPageViewResponse:
  type: object
  description: Result wrapper for getRopewikiPageView (ropegeo-common Result; resultType + result)
  required:
    - resultType
    - result
  properties:
    resultType:
      type: string
      enum:
        - ropewikiPageView
      description: Discriminator for single-result API responses (ropegeo-common ResultType)
    result:
      $ref: "#/RopewikiPageView"
      description: The RopewikiPageView payload

RopewikiPageView:
  type: object
  description: Full online view of a Ropewiki page (GET /ropewiki/page/{id}) as ropegeo-common OnlineRopewikiPageView.
  required:
    - id
    - routeType
    - pageViewType
    - fetchType
    - name
    - aka
    - url
    - quality
    - userVotes
    - difficultyRating
    - regions
    - months
    - latestRevisionDate
    - betaSections
  properties:
    id:
      type: string
      format: uuid
      description: RopewikiPage row id
    routeType:
      type: string
      enum:
        - Unknown
        - POI
        - Cave
        - Canyon
      description: Route type for the linked route when available; Unknown when no linked route is available
    pageViewType:
      type: string
      enum:
        - ropewiki
      description: Page view discriminator
    fetchType:
      type: string
      enum:
        - online
      description: Online/offline discriminator for page-view model families
    name:
      type: string
      description: Page name
    aka:
      type: array
      items:
        type: string
      description: Also-known-as names
    url:
      type: string
      format: uri
      description: Page URL
    quality:
      type: number
      format: float
      description: Quality rating
    userVotes:
      type: integer
      description: Number of votes
    difficultyRating:
      $ref: "./getRoutePreviewResponse.yaml#/DifficultyRating"
    permit:
      type: string
      nullable: true
      description: Permit status (Yes, No, Restricted, Closed, or null)
      enum:
        - Yes
        - No
        - Restricted
        - Closed
        - null
    rappelCount:
      description: Rappel count; either a single number, or min/max object when parsed from rappelInfo (e.g. "4-6r")
      oneOf:
        - type: integer
        - type: object
          properties:
            min:
              type: integer
            max:
              type: integer
        - enum: [null]
    jumps:
      type: integer
      nullable: true
      description: Number of jumps parsed from rappelInfo (e.g. "+j" = 1, "+2j" = 2)
    vehicle:
      type: string
      nullable: true
      description: Vehicle requirement (RopewikiVehicleType, or null)
      enum:
        - passenger
        - highClearance
        - fourWd
        - fourWdHighClearance
        - fourWdVeryHighClearance
    rappelLongest:
      description: Longest rappel as a LengthMeasurement (source unit feet), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    shuttleTime:
      description: Shuttle time as a TimeMeasurement (source unit minutes), or null
      oneOf:
        - $ref: "#/TimeMeasurement"
        - enum: [null]
    overallTime:
      description: Overall time as a single TimeMeasurement, a min/max range of TimeMeasurements (source unit hours), or null
      oneOf:
        - $ref: "#/TimeMeasurement"
        - $ref: "#/TimeMeasurementRange"
        - enum: [null]
    overallLength:
      description: Total canyon/hike length as a LengthMeasurement (source unit miles), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    approachLength:
      description: Approach segment length as a LengthMeasurement (source unit miles), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    approachElevGain:
      description: Approach elevation gain as a LengthMeasurement (source unit feet), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    descentLength:
      description: Descent segment length as a LengthMeasurement (source unit miles), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    descentElevGain:
      description: Descent elevation gain as a LengthMeasurement (source unit feet, typically negative), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    exitLength:
      description: Exit segment length as a LengthMeasurement (source unit miles), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    exitElevGain:
      description: Exit elevation gain as a LengthMeasurement (source unit feet), or null
      oneOf:
        - $ref: "#/LengthMeasurement"
        - enum: [null]
    approachTime:
      description: Approach time as a single TimeMeasurement, a min/max range of TimeMeasurements (source unit hours), or null
      oneOf:
        - $ref: "#/TimeMeasurement"
        - $ref: "#/TimeMeasurementRange"
        - enum: [null]
    descentTime:
      description: Descent time as a single TimeMeasurement, a min/max range of TimeMeasurements (source unit hours), or null
      oneOf:
        - $ref: "#/TimeMeasurement"
        - $ref: "#/TimeMeasurementRange"
        - enum: [null]
    exitTime:
      description: Exit time as a single TimeMeasurement, a min/max range of TimeMeasurements (source unit hours), or null
      oneOf:
        - $ref: "#/TimeMeasurement"
        - $ref: "#/TimeMeasurementRange"
        - enum: [null]
    months:
      type: array
      items:
        type: string
      description: Best months (e.g. Jun, Jul)
    regions:
      type: array
      description: Region lineage (leaf to root), with id and name for each region
      items:
        type: object
        required:
          - id
          - name
        properties:
          id:
            type: string
            format: uuid
            description: RopewikiRegion id
          name:
            type: string
            description: Region name
    latestRevisionDate:
      type: string
      format: date-time
      description: Last revision date
    bannerImage:
      $ref: "#/BetaSectionImage"
      nullable: true
      description: Banner image (first non–beta-section image)
    betaSections:
      type: array
      items:
        $ref: "#/BetaSection"
      description: Beta sections with text and images
    miniMap:
      type: object
      nullable: true
      description: |
        Online vector tile minimap when MapData has a non-empty id, tile template, and valid bounds; otherwise **centeredRegion** when the page has a linked route without that full tile set; otherwise null. Use **mapDataId** on page minimaps for the MapData record id; MVT layer names are **polyLineLayerId** / **pointLayerId** on the minimap.
      anyOf:
        - $ref: './miniMap.yaml#/PageMiniMap'
        - $ref: './miniMap.yaml#/OnlineCenteredRegionMiniMap'
    coordinates:
      description: Page centroid in WGS84 degrees when stored coordinates are valid; otherwise null (not inferred from minimap bounds)
      nullable: true
      $ref: "#/PageViewCoordinates"
    downloadFolder:
      type: string
      format: uri
      nullable: true
      description: Public HTTPS URL to a pre-built offline page ZIP bundle, or null when no bundle is available (client falls back to legacy multi-request download)

PageViewCoordinates:
  type: object
  description: Geographic point in WGS84 degrees (latitude and longitude)
  required:
    - lat
    - lon
  properties:
    lat:
      type: number
      format: float
      description: Latitude in degrees
    lon:
      type: number
      format: float
      description: Longitude in degrees

LengthMeasurement:
  type: object
  description: A length value tagged with an explicit unit (ropegeo-common LengthMeasurement)
  required:
    - value
    - measurementType
    - unit
  properties:
    value:
      type: number
      description: Numeric magnitude of the length, expressed in the unit named by unit
    measurementType:
      type: string
      description: Measurement discriminator (always "length" for a LengthMeasurement)
      enum:
        - length
    unit:
      $ref: "#/LengthMeasurementUnit"

LengthMeasurementUnit:
  type: object
  description: Unit descriptor for a LengthMeasurement (measurement system plus the specific unit name)
  required:
    - measurementSystem
    - name
  properties:
    measurementSystem:
      type: string
      description: Measurement system the unit belongs to
      enum:
        - Imperial
        - Metric
        - Freedom
    name:
      type: string
      description: Unit name within the system (e.g. feet, miles, meters, kilometers, or a Freedom unit like "Football Fields")

TimeMeasurement:
  type: object
  description: A duration value tagged with an explicit unit (ropegeo-common TimeMeasurement)
  required:
    - value
    - measurementType
    - unit
  properties:
    value:
      type: number
      description: Numeric magnitude of the duration, expressed in the unit named by unit
    measurementType:
      type: string
      description: Measurement discriminator (always "time" for a TimeMeasurement)
      enum:
        - time
    unit:
      $ref: "#/TimeMeasurementUnit"

TimeMeasurementUnit:
  type: object
  description: Unit descriptor for a TimeMeasurement (measurement system plus the specific unit name)
  required:
    - measurementSystem
    - name
  properties:
    measurementSystem:
      type: string
      description: Measurement system the unit belongs to
      enum:
        - Standard
        - Freedom
    name:
      type: string
      description: Unit name within the system (e.g. minutes, hours, days, or a Freedom unit like "Scaramuccis")

TimeMeasurementRange:
  type: object
  description: Inclusive min/max range of time measurements (ropegeo-common MinMax of TimeMeasurement)
  required:
    - min
    - max
  properties:
    min:
      $ref: "#/TimeMeasurement"
    max:
      $ref: "#/TimeMeasurement"

BetaSectionImage:
  type: object
  description: Online image view (banner or beta-section image) as ropegeo-common OnlineBetaSectionImage
  required:
    - fetchType
    - order
    - id
    - bannerUrl
    - fullUrl
    - linkUrl
    - caption
    - latestRevisionDate
    - downloadBytes
  properties:
    fetchType:
      type: string
      enum:
        - online
    order:
      type: integer
    id:
      type: string
      format: uuid
      description: RopewikiImage row id (stable key for offline image maps)
    bannerUrl:
      type: string
      format: uri
      nullable: true
      description: Banner image URL when available from processed image data; otherwise null.
    fullUrl:
      type: string
      format: uri
      nullable: true
      description: Full-size image URL when available from processed image data; otherwise null.
    linkUrl:
      type: string
      format: uri
      description: Link URL
    caption:
      type: string
      nullable: true
    latestRevisionDate:
      type: string
      format: date-time
    downloadBytes:
      description: Approximate byte sizes per rendition from processed image metadata (null when no ImageData is linked); banner row includes preview/banner/full; beta-section images use preview 0 and banner/full only
      $ref: '#/DownloadBytes'
      nullable: true

DownloadBytes:
  type: object
  description: Byte sizes for preview, banner, and full renditions (approximate, from stored sizeKB in metadata)
  required:
    - preview
    - banner
    - full
  properties:
    preview:
      type: number
      minimum: 0
      description: Approximate byte size for the preview rendition
    banner:
      type: number
      minimum: 0
      description: Approximate byte size for the banner rendition
    full:
      type: number
      minimum: 0
      description: Approximate byte size for the full rendition

BetaSection:
  type: object
  description: Online beta section (ropegeo-common OnlineBetaSection)
  required:
    - fetchType
    - order
    - title
    - text
    - images
    - latestRevisionDate
  properties:
    fetchType:
      type: string
      enum:
        - online
    order:
      type: integer
    title:
      type: string
    text:
      type: string
    images:
      type: array
      items:
        $ref: "#/BetaSectionImage"
    latestRevisionDate:
      type: string
      format: date-time
