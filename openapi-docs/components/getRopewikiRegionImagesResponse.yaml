GetRopewikiRegionImagesResponse:
  type: object
  description: Response body for getRopewikiRegionImages (RopewikiRegionImagesResult from ropegeo-common); contains resultType, results and nextCursor for pagination.
  required:
    - resultType
    - results
    - nextCursor
  properties:
    resultType:
      type: string
      description: Discriminator for cursor-paginated result type; always "ropewikiRegionImages" for this endpoint (ropegeo-common ResultType)
      enum:
        - ropewikiRegionImages
    results:
      type: array
      description: List of banner images (RopewikiRegionImageView) for pages in the region and its descendants, ordered by page popularity (quality * userVotes)
      items:
        $ref: '#/RopewikiRegionImageView'
    nextCursor:
      type: string
      nullable: true
      description: Base64url-encoded cursor for the next page; null when there are no more results

RopewikiRegionImageView:
  type: object
  description: Banner image view for getRopewikiRegionImages (id, pageId, pageName, bannerUrl, fullUrl, externalLink, caption)
  required:
    - id
    - pageId
    - pageName
    - bannerUrl
    - fullUrl
    - externalLink
  properties:
    id:
      type: string
      format: uuid
      description: RopewikiImage id
    pageId:
      type: string
      format: uuid
      description: RopewikiPage id this image belongs to
    pageName:
      type: string
      description: Display name of the page
    bannerUrl:
      type: string
      format: uri
      description: Banner image URL from processed image data.
    fullUrl:
      type: string
      format: uri
      description: Full-size image URL from processed image data.
    externalLink:
      type: string
      format: uri
      description: Link URL (e.g. to Ropewiki file page)
    caption:
      type: string
      nullable: true
      description: Optional image caption
