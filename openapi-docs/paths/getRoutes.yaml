# /routes
get:
  summary: List routes as GeoJSON (paginated)
  description: |
    Returns one page of routes as GeoJSON Features (`resultType` **route**, `results`, `total`, `page`). Use **limit** and **page** for pagination (defaults match ropegeo-common `RoutesParams`: limit 500, page 1). Order is stable by route id.
    Optional **region** scopes to routes linked to Ropewiki pages in that region and descendants.
    Optional **source** pipe-list restricts by page data source when region is set (omit or empty = all sources). If the allow-list excludes all known sources (e.g. non-ropewiki only), the result is empty.
    Optional **route-type** filters `Route.type`. Optional **ACA difficulty** query keys filter routes that have a linked Ropewiki page matching the allow-lists. **`aca-risk-rating`** matches **effective** ACA risk (technical default floor when stored risk is null or milder), not the raw `riskRating` column alone.
    Map bounds for a region are not included; use **GET /ropewiki/region/{id}/bounds** for a bounding box over route coordinates in the subtree.
    **Source** without **region** remains invalid (ropegeo-common `RoutesParams`). **Region** may be provided without **source** (all sources in subtree).
    Validation follows ropegeo-common `RoutesParams.fromQueryStringParams`.
  operationId: getRoutes
  tags:
    - routes
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
      description: Page size (default 500; max 500)
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: 1-based page index (default 1)
    - name: source
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited page data sources (e.g. `ropewiki`); only meaningful with `region`
    - name: region
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Region id (and descendants) to restrict routes
    - name: route-type
      in: query
      required: false
      schema:
        type: string
        enum:
          - Unknown
          - POI
          - Cave
          - Canyon
      description: Filter by route type when set
    - name: difficulty-type
      in: query
      required: false
      schema:
        type: string
      description: Difficulty scale (e.g. `aca`)
    - name: aca-technical-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA technical ratings
    - name: aca-water-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA water ratings
    - name: aca-time-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA time ratings
    - name: aca-risk-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA risk ratings; pages match when their **effective** risk (see ropegeo-common `AcaDifficulty`) is in the set
  x-amazon-apigateway-integration:
    $ref: '../integrations/getRoutesLambda.yaml#/GetRoutesLambdaIntegration'
  responses:
    '200':
      description: Successful response; one page of GeoJSON route features with total count
      content:
        application/json:
          schema:
            $ref: '../components/getRoutesResponse.yaml#/GetRoutesResponse'
          examples:
            getRoutesResponse:
              $ref: '../examples/getRoutesResponse.yaml'
    '400':
      description: Bad Request (e.g. source without region, invalid UUID, invalid filters)
    '500':
      description: Internal server error
