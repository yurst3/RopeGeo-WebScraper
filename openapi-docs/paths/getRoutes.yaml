# /routes
get:
  summary: List routes as GeoJSON (paginated)
  description: |
    Returns one page of routes as GeoJSON Features (`resultType` **route**, `results`, `total`, `page`). Use **limit** and **page** for pagination (defaults match ropegeo-common `RoutesParams`: limit 500, page 1). Order is stable by route id.

    **Region scope:** pass **region-id** (UUID) and **region-source** (single page data source, e.g. `ropewiki`) together. They identify which catalogue’s routes to load for that region subtree. Omit both for a global listing.

    **Global source filter:** when **region-id** is omitted, optional **sources** is a pipe-delimited allow-list of page data sources (e.g. `ropewiki`). Omit or empty **sources** = all sources. **region-id** / **region-source** must not be combined with **sources** (ropegeo-common validation).

    Optional **route-types** is an allow-list for `Route.type` (pipe-delimited in the query string, e.g. `Canyon|Cave`). Optional **ACA difficulty** query keys filter routes that have a linked Ropewiki page matching the allow-lists. **`aca-risk-rating`** matches **effective** ACA risk (technical default floor when stored risk is null or milder), not the raw `riskRating` column alone.

    Map bounds for a region are not included; use **GET /ropewiki/region/{id}/bounds** for a bounding box over route coordinates in the subtree.

    Validation follows ropegeo-common `RoutesParams.fromQueryStringParams`.
  operationId: getRoutes
  tags:
    - routes
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
      description: Page size (default 500; max 500)
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: 1-based page index (default 1)
    - name: region-id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Ropewiki region id (and descendants) to restrict routes; requires **region-source** when set
    - name: region-source
      in: query
      required: false
      schema:
        type: string
        enum:
          - ropewiki
      description: Single page data source for the region scope; required when **region-id** is set
    - name: sources
      in: query
      required: false
      schema:
        type: string
      description: |
        Pipe-delimited allow-list of page data sources for **global** listings only (e.g. `ropewiki`).
        Must not be sent together with **region-id** / **region-source**.
    - name: route-types
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        description: Allow-list of `Route.type` values; omit or empty means no filter
        items:
          type: string
          description: Route classification
          enum:
            - Unknown
            - POI
            - Cave
            - Canyon
      description: |
        Filter by one or more route types. On the wire this is a **single** query parameter whose value uses **pipe** (`|`) delimiters between types (e.g. `route-types=Canyon|Cave`), matching ropegeo-common `RoutesParams` — not comma-separated.
    - name: difficulty-type
      in: query
      required: false
      schema:
        type: string
      description: Difficulty scale (e.g. `aca`)
    - name: aca-technical-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA technical ratings
    - name: aca-water-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA water ratings
    - name: aca-time-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA time ratings
    - name: aca-risk-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA risk ratings; pages match when their **effective** risk (see ropegeo-common `AcaDifficulty`) is in the set
  x-amazon-apigateway-integration:
    $ref: '../integrations/getRoutesLambda.yaml#/GetRoutesLambdaIntegration'
  responses:
    '200':
      description: Successful response; one page of GeoJSON route features with total count
      content:
        application/json:
          schema:
            $ref: '../components/getRoutesResponse.yaml#/GetRoutesResponse'
          examples:
            getRoutesResponse:
              $ref: '../examples/getRoutesResponse.yaml'
    '400':
      description: Bad Request (e.g. **region-source** without **region-id**, **region-id** without **region-source**, mixing region params with **sources**, invalid UUID, invalid filters)
    '500':
      description: Internal server error
