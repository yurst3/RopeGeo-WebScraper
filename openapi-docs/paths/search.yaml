# /search
get:
  summary: Search pages and regions
  description: |
    Search Ropewiki pages and regions. **Order `similarity`**: trigram `word_similarity` on names; empty name returns no results.
    **Order `quality`**: rank by quality × userVotes; empty name lists all pages/regions (subject to filters). **Order `distance`**: pages only, ranked by (1 / distance) × quality × userVotes from `lat`/`lon` to page `coordinates`; requires `lat` and `lon`.
    Optional **source** pipe-list filters page rows by `PageDataSource` (empty/absent = all). Optional **ACA difficulty** query keys match GET `/routes` (`difficulty-type`, `aca-technical-rating`, …) and apply to **page** paths only. **`aca-risk-rating`** uses **effective** ACA risk (same as GET `/routes`), not raw stored risk alone.
    Validation follows ropegeo-common `SearchParams.fromQueryStringParams`.
  operationId: search
  tags:
    - search
  parameters:
    - name: name
      in: query
      required: false
      schema:
        type: string
      description: Fuzzy match text; may be empty when order is quality or distance (similarity requires non-empty for matches)
    - name: similarity
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        maximum: 1
        default: 0.5
      description: Minimum trigram similarity when matching names; number in [0, 1]
    - name: include-pages
      in: query
      required: false
      schema:
        type: boolean
        default: true
      description: Include page results; true, false, 1, or 0 (case-insensitive)
    - name: include-regions
      in: query
      required: false
      schema:
        type: boolean
        default: true
      description: Include region results; must be false when order is distance. At least one of include-pages or include-regions must be true.
    - name: include-aka
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: When true, also match page AKA names
    - name: order
      in: query
      required: false
      schema:
        type: string
        enum:
          - similarity
          - quality
          - distance
        default: similarity
      description: Result ordering strategy
    - name: lat
      in: query
      required: false
      schema:
        type: number
      description: Required with `lon` when order is `distance` (user latitude)
    - name: lon
      in: query
      required: false
      schema:
        type: number
      description: Required with `lat` when order is `distance` (user longitude)
    - name: source
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited page data sources (e.g. `ropewiki`); omit or empty for all
    - name: difficulty-type
      in: query
      required: false
      schema:
        type: string
      description: Difficulty scale (e.g. `aca`); use with aca-*-rating params
    - name: aca-technical-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA technical ratings filter
    - name: aca-water-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA water ratings filter
    - name: aca-time-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA time ratings filter
    - name: aca-risk-rating
      in: query
      required: false
      schema:
        type: string
      description: Pipe-delimited ACA risk ratings; pages match when **effective** risk is in the set (ropegeo-common `AcaDifficulty`)
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
      description: Page size
    - name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Base64url-encoded cursor from prior `nextCursor`
  x-amazon-apigateway-integration:
    $ref: '../integrations/searchLambda.yaml#/SearchLambdaIntegration'
  responses:
    '200':
      description: Successful response; list of matching pages and/or regions
      content:
        application/json:
          schema:
            $ref: '../components/searchResponse.yaml#/SearchResponse'
          examples:
            searchResponse:
              $ref: '../examples/searchResponse.yaml'
    '400':
      description: Bad Request (invalid query per SearchParams)
    '500':
      description: Internal server error
