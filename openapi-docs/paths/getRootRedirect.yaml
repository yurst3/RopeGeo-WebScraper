# /
# Served at the CloudFront docs origin (root or /docs/index.html). This path is documented for OpenAPI; direct API calls return 404.
get:
  summary: Redirect to API docs
  description: Redirects to the API documentation at /docs/index.html. In production, root and docs are served by CloudFront from the docs origin.
  operationId: getRootRedirect
  tags:
    - root
  x-amazon-apigateway-integration:
    $ref: '../integrations/getRootRedirectHttpProxy.yaml#/GetRootRedirectHttpProxyIntegration'
  responses:
    '302':
      description: Redirect to /docs/index.html
      headers:
        Location:
          schema:
            type: string
            example: /docs/index.html
    '500':
      description: Internal server error
