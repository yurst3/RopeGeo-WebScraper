# /ropewiki/region/{id}/images
get:
  summary: Get Ropewiki region images
  description: |
    Returns paginated RopewikiRegionImageView (banner images, betaSection IS NULL) for pages in the given region and its descendants.
    Ordered by page popularity (quality * userVotes) descending.
    Query parameter validation follows ropegeo-common RopewikiRegionImagesParams.fromQueryStringParams (limit a positive integer; cursor a valid base64url-encoded cursor if present).
  operationId: getRopewikiRegionImages
  tags:
    - ropewiki
  parameters:
    - name: id
      in: path
      required: true
      description: RopewikiRegion uuid
      schema:
        type: string
        format: uuid
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
      description: Page size
    - name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Base64url-encoded cursor for the next page (from previous response nextCursor); must be valid if provided
  x-amazon-apigateway-integration:
    $ref: '../integrations/getRopewikiRegionImagesLambda.yaml#/GetRopewikiRegionImagesLambdaIntegration'
  responses:
    '200':
      description: Successful response; list of banner images for pages in the region and its descendants
      content:
        application/json:
          schema:
            $ref: '../components/getRopewikiRegionImagesResponse.yaml#/GetRopewikiRegionImagesResponse'
          examples:
            getRopewikiRegionImagesResponse:
              $ref: '../examples/getRopewikiRegionImagesResponse.yaml'
    '400':
      description: Bad Request; missing, empty, or invalid UUID id, or invalid query parameters (limit, cursor)
    '404':
      description: Not Found; no Ropewiki region exists with the given id
    '500':
      description: Internal server error
