# /docs/{file}
get:
  summary: Serve API documentation
  description: |
    Returns the built API documentation files.
    - index.html - Redoc HTML documentation
    - openapi.yaml - Bundled OpenAPI spec (YAML)
    - openapi.json - Bundled OpenAPI spec (JSON)
  operationId: getApiDocs
  tags:
    - docs
  x-amazon-apigateway-request-validator: params-only
  x-amazon-apigateway-integration:
    $ref: '../integrations/getApiDocsLambda.yaml#/GetApiDocsLambdaIntegration'
  parameters:
    - name: file
      in: path
      required: true
      description: The documentation file to return
      schema:
        type: string
        enum:
          - index.html
          - openapi.yaml
          - openapi.json
  responses:
    '200':
      description: The requested documentation file
      content:
        text/html:
          schema: { type: string }
        application/x-yaml:
          schema: { type: string }
        application/json:
          schema: { type: object }
    '400':
      description: Bad request (e.g. missing or invalid path parameter)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Validation error message
    '404':
      description: File not found
