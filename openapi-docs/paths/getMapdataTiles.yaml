# /mapdata/{mapDataId}/tiles
get:
  summary: List vector tile download URLs for map data
  description: |
    Returns a paginated list of full HTTPS URLs for `.pbf` tiles stored under `tiles/{mapDataId}/` in the map data bucket (public URL shape follows `MAP_DATA_PUBLIC_BASE_URL` / CloudFront when configured).
    Use `page` and `limit` to walk all URLs; `total` is the count of all matching tiles and `totalBytes` is the sum of their sizes (for offline download progress).
  operationId: getMapdataTiles
  tags:
    - mapdata
  x-amazon-apigateway-request-validator: params-only
  parameters:
    - name: mapDataId
      in: path
      required: true
      description: MapData uuid (same id as in page minimap tiles template)
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      required: false
      description: Page number (1-based; default 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      description: Page size (default 50; maximum 5000)
      schema:
        type: integer
        minimum: 1
        maximum: 5000
        default: 50
  x-amazon-apigateway-integration:
    $ref: '../integrations/getMapdataTilesLambda.yaml#/GetMapdataTilesLambdaIntegration'
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../components/getMapdataTilesResponse.yaml#/GetMapdataTilesResponse'
          examples:
            getMapdataTilesResponse:
              $ref: '../examples/getMapdataTilesResponse.yaml'
    '400':
      description: Bad Request; missing or invalid mapDataId, or invalid page or limit
    '500':
      description: Internal server error
