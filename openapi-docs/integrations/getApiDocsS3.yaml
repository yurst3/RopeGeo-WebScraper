GetApiDocsS3Integration:
  type: aws
  httpMethod: GET
  uri: arn:aws:apigateway:$env-REGION:s3:path/{bucket}/{object}
  credentials: $env-APIGATEWAY_INVOKE_S3_ROLE_ARN
  requestParameters:
    integration.request.path.bucket: "'$env-DOCS_BUCKET_NAME'"
    integration.request.path.object: method.request.path.file
  responses:
    "2\\d{2}":
      statusCode: "200"
      responseParameters:
        method.response.header.Content-Type: integration.response.header.Content-Type
        method.response.header.Content-Length: integration.response.header.Content-Length
    "4\\d{2}":
      statusCode: "404"
    default:
      statusCode: "500"
  passthroughBehavior: when_no_match
