name: Pipeline

on:
  push:
    branches:
      - 'master'

env:
  PIPELINE_USER_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  PIPELINE_USER_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TESTING_STACK_NAME: WebScraper
  TESTING_PIPELINE_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-dev-pipel-PipelineExecutionRole-H6pcsIlT1GzO
  TESTING_CLOUDFORMATION_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-dev-p-CloudFormationExecutionRo-tEPpCOWZDOCO
  TESTING_ARTIFACTS_BUCKET: aws-sam-cli-managed-dev-pipeline-r-artifactsbucket-vab3mw03pxxb
  # If there are functions with "Image" PackageType in your template,
  # uncomment the line below and add "--image-repository ${TESTING_IMAGE_REPOSITORY}" to
  # testing "sam package" and "sam deploy" commands.
  # TESTING_IMAGE_REPOSITORY = '0123456789.dkr.ecr.region.amazonaws.com/repository-name'
  TESTING_REGION: us-east-1
  PROD_STACK_NAME: WebScraper-Prod
  PROD_PIPELINE_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-productio-PipelineExecutionRole-FRy7F5j0k91U
  PROD_CLOUDFORMATION_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-produ-CloudFormationExecutionRo-YIlb8V9GNR1Y
  PROD_ARTIFACTS_BUCKET: aws-sam-cli-managed-production-pip-artifactsbucket-ixo4vubbqj28
  # If there are functions with "Image" PackageType in your template,
  # uncomment the line below and add "--image-repository ${PROD_IMAGE_REPOSITORY}" to
  # prod "sam package" and "sam deploy" commands.
  # PROD_IMAGE_REPOSITORY = '0123456789.dkr.ecr.region.amazonaws.com/repository-name'
  PROD_REGION: us-east-1
  TESTING_API_STACK_NAME: WebScraper-Api
  PROD_API_STACK_NAME: WebScraper-Api-Prod
  DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
  DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
  PROD_DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}
  PROD_DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: node:20-bookworm-slim
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: testPass
          POSTGRES_USER: testUser
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Install SAM CLI
        run: |
          apt-get update
          apt-get install -y pipx
          pipx install aws-sam-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Lint main template
        run: npm run lint:main-template
        env:
          SAM_CLI_TELEMETRY: 0
          AWS_DEFAULT_REGION: us-east-1

      - name: Lint API template
        run: npm run lint:api-template
        env:
          SAM_CLI_TELEMETRY: 0
          AWS_DEFAULT_REGION: us-east-1

      - name: Check for Fn::Condition in merged main template
        run: |
          if grep -q "Fn::Condition" cloudformation/stacks/mergedMainTemplate.yaml; then
            echo "::error::Use Condition not Fn::Condition for condition references (CloudFormation rejects Fn::Condition)"
            exit 1
          fi

      - name: Lint OpenAPI docs
        run: npm run lint:openapi

      - name: Install chrome
        run: npx puppeteer browsers install chrome

      - name: Install missing packages
        run: apt-get update; apt install -y gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils wget

      - name: Run database migrations
        run: npx dbmate --url postgres://testUser:testPass@postgres:5432/test?sslmode=disable up

      - name: Run all tests
        run: npm run test:deploy
        env:
          TEST_USER: testUser
          TEST_PASS: testPass
          TEST_HOST: postgres
          TEST_PORT: 5432
          TEST_DB: test

  build-and-package-main:
    if: github.ref == 'refs/heads/master'
    needs: [test]
    # Use arm64 runner so MapDataProcessor's arm64 build image runs natively (avoids slow QEMU emulation on x86_64).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Merge main template (inline lambdas from lambdas/*.yaml)
        run: npm run merge:main-template
      - name: Check for Fn::Condition in merged template
        run: |
          if grep -q "Fn::Condition" cloudformation/stacks/mergedMainTemplate.yaml; then
            echo "::error::Use Condition not Fn::Condition for condition references (CloudFormation rejects Fn::Condition)"
            exit 1
          fi
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # MapDataProcessor is arm64 and includes a native tippecanoe binary; it must be built in an arm64 container.
      - name: Build resources
        run: sam build --template cloudformation/stacks/mergedMainTemplate.yaml --use-container --build-image public.ecr.aws/sam/build-nodejs22.x --build-image MapDataProcessor=public.ecr.aws/sam/build-nodejs22.x:latest-arm64

      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-packaging
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Upload artifacts to testing artifact buckets
        run: |
          sam package \
            --config-env ci \
            --s3-bucket ${TESTING_ARTIFACTS_BUCKET} \
            --region ${TESTING_REGION} \
            --output-template-file packaged-testing.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-testing.yaml
          path: packaged-testing.yaml

      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-packaging
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Upload artifacts to production artifact buckets
        run: |
          sam package \
            --config-env ci \
            --s3-bucket ${PROD_ARTIFACTS_BUCKET} \
            --region ${PROD_REGION} \
            --output-template-file packaged-prod.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-prod.yaml
          path: packaged-prod.yaml

  deploy-testing-main:
    # Disabled for now; set to "github.ref == 'refs/heads/master'" to re-enable
    if: false
    needs: [build-and-package-main]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/download-artifact@v4
        with:
          name: packaged-testing.yaml

      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-deployment
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Deploy to testing account
        env:
          DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
          DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$DEV_DATABASE_USERNAME" ] || [ -z "$DEV_DATABASE_PASSWORD" ]; then
            echo "Error: DEV_DATABASE_USERNAME and DEV_DATABASE_PASSWORD must be set as repository secrets."
            exit 1
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "Error: PROXY_URL must be set as a repository secret for dev deployment."
            exit 1
          fi
          FCK_NAT_AMI=$(aws ec2 describe-images --owners 568608671756 \
            --filters "Name=name,Values=fck-nat-al2023-*" "Name=architecture,Values=arm64" \
            --query "sort_by(Images,&CreationDate)[-1].ImageId" --output text \
            --region ${TESTING_REGION})
          sam deploy --config-env ci \
            --stack-name ${TESTING_STACK_NAME} \
            --template packaged-testing.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${TESTING_REGION} \
            --s3-bucket ${TESTING_ARTIFACTS_BUCKET} \
            --no-fail-on-empty-changeset \
            --role-arn ${TESTING_CLOUDFORMATION_EXECUTION_ROLE} \
            --parameter-overrides "devEnvironment=dev DatabaseUsername=$DEV_DATABASE_USERNAME DatabasePassword=$DEV_DATABASE_PASSWORD FckNatAMIId=$FCK_NAT_AMI ProxyUrl=$PROXY_URL DocsBucketPipelineRoleArn=$TESTING_PIPELINE_EXECUTION_ROLE PipelineExecutionRoleName=${TESTING_PIPELINE_EXECUTION_ROLE##*/}"

  deploy-prod-main:
    if: github.ref == 'refs/heads/master'
    needs: [build-and-package-main]
    runs-on: ubuntu-latest
    # Configure GitHub Action Environment to have a manual approval step before deployment to production
    # https://docs.github.com/en/actions/reference/environments
    # environment: <configured-environment>
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/download-artifact@v4
        with:
          name: packaged-prod.yaml

      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-deployment
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Deploy to production account
        env:
          PROD_DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}
          PROD_DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROD_DATABASE_USERNAME" ] || [ -z "$PROD_DATABASE_PASSWORD" ]; then
            echo "Error: PROD_DATABASE_USERNAME and PROD_DATABASE_PASSWORD must be set as repository secrets."
            exit 1
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "Error: PROXY_URL must be set as a repository secret for production deployment."
            exit 1
          fi
          FCK_NAT_AMI=$(aws ec2 describe-images --owners 568608671756 \
            --filters "Name=name,Values=fck-nat-al2023-*" "Name=architecture,Values=arm64" \
            --query "sort_by(Images,&CreationDate)[-1].ImageId" --output text \
            --region ${PROD_REGION})
          sam deploy --config-env ci \
            --stack-name ${PROD_STACK_NAME} \
            --template packaged-prod.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${PROD_REGION} \
            --s3-bucket ${PROD_ARTIFACTS_BUCKET} \
            --no-fail-on-empty-changeset \
            --role-arn ${PROD_CLOUDFORMATION_EXECUTION_ROLE} \
            --parameter-overrides "devEnvironment=production DatabaseUsername=$PROD_DATABASE_USERNAME DatabasePassword=$PROD_DATABASE_PASSWORD FckNatAMIId=$FCK_NAT_AMI ProxyUrl=$PROXY_URL DocsBucketPipelineRoleArn=$PROD_PIPELINE_EXECUTION_ROLE PipelineExecutionRoleName=${PROD_PIPELINE_EXECUTION_ROLE##*/}"

  build-push-fargate-tasks:
    if: always() && github.ref == 'refs/heads/master' && (needs.deploy-prod-main.result == 'success' || needs.deploy-testing-main.result == 'success')
    needs: [deploy-prod-main, deploy-testing-main]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: build-push-fargate-images
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Get ECR repository URIs from stack outputs (all Fargate tasks)
        id: ecr-outputs
        run: |
          set -e
          # Output keys must end with "RepositoryUri"; folder = prefix in camelCase (e.g. GenerateRouteMarkerTiles -> generateRouteMarkerTiles). Code lives under src/fargate-tasks/<folder>/
          TMPFILE=$(mktemp)
          if [ "${{ needs.deploy-prod-main.result }}" == "success" ]; then
            aws cloudformation describe-stacks --stack-name ${PROD_STACK_NAME} --region ${PROD_REGION} \
              --query 'Stacks[0].Outputs' --output json 2>/dev/null | jq -r '.[] | select(.OutputKey | endswith("RepositoryUri")) | "\(.OutputKey | sub("RepositoryUri$"; "") | (.[0:1] | ascii_downcase) + .[1:]) \(.OutputValue)"' >> "$TMPFILE" || true
          fi
          if [ "${{ needs.deploy-testing-main.result }}" == "success" ]; then
            aws cloudformation describe-stacks --stack-name ${TESTING_STACK_NAME} --region ${TESTING_REGION} \
              --query 'Stacks[0].Outputs' --output json 2>/dev/null | jq -r '.[] | select(.OutputKey | endswith("RepositoryUri")) | "\(.OutputKey | sub("RepositoryUri$"; "") | (.[0:1] | ascii_downcase) + .[1:]) \(.OutputValue)"' >> "$TMPFILE" || true
          fi
          # One line per "folder uri" (same folder can appear twice for testing + prod URIs)
          echo "entries<<EOF" >> $GITHUB_OUTPUT
          cat "$TMPFILE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          HAS_ENTRIES=$( [ -s "$TMPFILE" ] && echo "true" || echo "false" )
          echo "has_entries=${HAS_ENTRIES}" >> $GITHUB_OUTPUT
          rm -f "$TMPFILE"

      - name: Build and push all Fargate task images
        if: steps.ecr-outputs.outputs.has_entries == 'true'
        env:
          ENTRIES: ${{ steps.ecr-outputs.outputs.entries }}
          PROD_REGION: ${{ env.PROD_REGION }}
        run: |
          set -e
          declare -A URIS_FOR_FOLDER
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            folder="${line%% *}"
            uri="${line#* }"
            [ -z "$folder" ] || [ -z "$uri" ] && continue
            DOCKERFILE="src/fargate-tasks/${folder}/Dockerfile"
            [ -f "$DOCKERFILE" ] || { echo "Skipping $folder: no $DOCKERFILE"; continue; }
            URIS_FOR_FOLDER[$folder]+="${uri} "
          done << 'ENTRIES_EOF'
          ${{ steps.ecr-outputs.outputs.entries }}
          ENTRIES_EOF

          REGISTRY=""
          for folder in "${!URIS_FOR_FOLDER[@]}"; do
            DOCKERFILE="src/fargate-tasks/${folder}/Dockerfile"
            [ -f "$DOCKERFILE" ] || continue
            first_uri=$(echo ${URIS_FOR_FOLDER[$folder]} | awk '{print $1}')
            if [ -z "$REGISTRY" ]; then
              REGISTRY="${first_uri%%/*}"
              aws ecr get-login-password --region ${PROD_REGION} | docker login --username AWS --password-stdin "${REGISTRY}"
            fi
            IMAGE_TAG="${folder,,}:latest"
            docker build -f "$DOCKERFILE" -t "${IMAGE_TAG}" .
            for uri in ${URIS_FOR_FOLDER[$folder]}; do
              docker tag "${IMAGE_TAG}" "${uri}"
              docker push "${uri}"
              echo "Pushed ${folder} to ${uri}"
            done
          done

  upload-api-docs:
    if: always() && github.ref == 'refs/heads/master' && (needs.deploy-prod-main.result == 'success' || needs.deploy-testing-main.result == 'success')
    needs: [deploy-prod-main, deploy-testing-main]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build OpenAPI docs with Redocly
        run: |
          npx @redocly/cli build-docs openapi-docs/index.yaml --output docs-build/index.html
          npx @redocly/cli bundle openapi-docs/index.yaml --output docs-build/openapi.yaml
          npx @redocly/cli bundle openapi-docs/index.yaml --output docs-build/openapi.json

      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: upload-api-docs
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Get main stack outputs for OpenAPI env resolution
        id: stack-outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='DocsBucketName'].OutputValue" \
            --output text)
          GET_ROUTES_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='GetRoutesLambdaArn'].OutputValue" \
            --output text)
          GET_ROUTE_PREVIEW_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='GetRoutePreviewLambdaArn'].OutputValue" \
            --output text)
          GET_ROPEWIKI_PAGE_VIEW_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='GetRopewikiPageViewLambdaArn'].OutputValue" \
            --output text)
          INVOKE_LAMBDA_ROLE=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayInvokeLambdaRoleArn'].OutputValue" \
            --output text)
          echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
          echo "get_routes_arn=${GET_ROUTES_ARN}" >> $GITHUB_OUTPUT
          echo "get_route_preview_arn=${GET_ROUTE_PREVIEW_ARN}" >> $GITHUB_OUTPUT
          echo "get_ropewiki_page_view_arn=${GET_ROPEWIKI_PAGE_VIEW_ARN}" >> $GITHUB_OUTPUT
          echo "invoke_lambda_role=${INVOKE_LAMBDA_ROLE}" >> $GITHUB_OUTPUT

      - name: Resolve OpenAPI $env- placeholders to openapiResolved.yaml
        run: |
          REGION=${{ env.PROD_REGION }} \
          GET_ROUTES_LAMBDA_ARN=${{ steps.stack-outputs.outputs.get_routes_arn }} \
          GET_ROUTE_PREVIEW_LAMBDA_ARN=${{ steps.stack-outputs.outputs.get_route_preview_arn }} \
          GET_ROPEWIKI_PAGE_VIEW_LAMBDA_ARN=${{ steps.stack-outputs.outputs.get_ropewiki_page_view_arn }} \
          APIGATEWAY_INVOKE_LAMBDA_ROLE_ARN=${{ steps.stack-outputs.outputs.invoke_lambda_role }} \
          DOCS_BUCKET_NAME=${{ steps.stack-outputs.outputs.bucket }} \
          npx ts-node --files scripts/resolveYamlEnvs.ts docs-build/openapi.yaml docs-build/openapiResolved.yaml

      - name: Upload docs to S3
        run: |
          aws s3 sync docs-build s3://${{ steps.stack-outputs.outputs.bucket }} --delete

  deploy-testing-api:
    # Disabled for now; set to "github.ref == 'refs/heads/master'" to re-enable
    if: false
    needs: [upload-api-docs]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-api-deployment
          role-duration-seconds: 3600
          role-skip-session-tagging: true
      - name: Get main stack outputs for API deployment
        id: get-buckets
        run: |
          DOCS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${TESTING_STACK_NAME} \
            --region ${TESTING_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='DocsBucketName'].OutputValue" \
            --output text)
          MAP_DATA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${TESTING_STACK_NAME} \
            --region ${TESTING_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='MapDataBucketName'].OutputValue" \
            --output text)
          echo "docs_bucket=${DOCS_BUCKET}" >> $GITHUB_OUTPUT
          echo "map_data_bucket=${MAP_DATA_BUCKET}" >> $GITHUB_OUTPUT
      - name: Merge API template
        run: npm ci && npm run merge:api-template
      - name: Deploy API stack to testing
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/stacks/mergedApiTemplate.yaml \
            --stack-name ${TESTING_API_STACK_NAME} \
            --parameter-overrides \
              DocsBucketName=${{ steps.get-buckets.outputs.docs_bucket }} \
              MapDataBucketName=${{ steps.get-buckets.outputs.map_data_bucket }} \
            --capabilities CAPABILITY_IAM \
            --region ${TESTING_REGION} \
            --no-fail-on-empty-changeset

  deploy-prod-api:
    if: always() && github.ref == 'refs/heads/master' && needs.upload-api-docs.result == 'success'
    needs: [upload-api-docs]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-api-deployment
          role-duration-seconds: 3600
          role-skip-session-tagging: true
      - name: Get main stack outputs for API deployment
        id: get-buckets
        run: |
          DOCS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='DocsBucketName'].OutputValue" \
            --output text)
          MAP_DATA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='MapDataBucketName'].OutputValue" \
            --output text)
          echo "docs_bucket=${DOCS_BUCKET}" >> $GITHUB_OUTPUT
          echo "map_data_bucket=${MAP_DATA_BUCKET}" >> $GITHUB_OUTPUT
      - name: Merge API template
        run: npm ci && npm run merge:api-template
      - name: Deploy API stack to production
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/stacks/mergedApiTemplate.yaml \
            --stack-name ${PROD_API_STACK_NAME} \
            --parameter-overrides \
              DocsBucketName=${{ steps.get-buckets.outputs.docs_bucket }} \
              MapDataBucketName=${{ steps.get-buckets.outputs.map_data_bucket }} \
              CustomDomainName=api.webscraper.ropegeo.com \
              CloudFrontCertificateArn=${{ secrets.PROD_CLOUDFRONT_CERTIFICATE_ARN }} \
            --capabilities CAPABILITY_IAM \
            --region ${PROD_REGION} \
            --no-fail-on-empty-changeset
      - name: Update main stack with CloudFront distribution ARN
        run: |
          if [ -n "${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ARN }}" ]; then
            CF_ARN="${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ARN }}"
          else
            CF_ARN=$(aws cloudformation describe-stacks \
              --stack-name ${PROD_API_STACK_NAME} \
              --region ${PROD_REGION} \
              --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionArn'].OutputValue" \
              --output text)
          fi
          CF_ARN=$(echo "$CF_ARN" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$CF_ARN" ] || [ "$CF_ARN" = "None" ]; then
            echo "::error::CloudFront distribution ARN is empty. Set PROD_CLOUDFRONT_DISTRIBUTION_ARN or ensure API stack output CloudFrontDistributionArn exists."
            exit 1
          fi
          echo "Fetching current main stack template for parameter-only update..."
          aws cloudformation get-template \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --output json > get-template-response.json
          # Extract template body with jq to avoid AWS CLI --output text bug with large templates ('str' has no attribute 'items').
          jq -r '.TemplateBody // empty' get-template-response.json > main-current-template.yaml
          if [ ! -s main-current-template.yaml ]; then
            URL=$(jq -r '.TemplateUrl // empty' get-template-response.json)
            if [ -n "$URL" ]; then
              curl -sSfL "${URL}" -o main-current-template.yaml
            else
              echo "::error::Could not retrieve main stack template (TemplateBody empty and no TemplateUrl)."
              rm -f get-template-response.json
              exit 1
            fi
          fi
          rm -f get-template-response.json
          if head -1 main-current-template.yaml | grep -q '^https\?://'; then
            TEMPLATE_URL=$(cat main-current-template.yaml)
            curl -sSfL "${TEMPLATE_URL}" -o main-current-template.yaml
          fi
          if ! grep -q 'CloudFrontDistributionArn' main-current-template.yaml; then
            echo "::error::Main stack template does not define CloudFrontDistributionArn. Deploy the main stack once with the current code (run the full pipeline so deploy-prod-main runs), then re-run this job."
            exit 1
          fi
          # Template exceeds 51,200 bytes inline limit; upload to S3 and use --template-url.
          echo "Uploading template to S3 (template exceeds inline size limit)..."
          aws s3 cp main-current-template.yaml "s3://${PROD_ARTIFACTS_BUCKET}/main-stack-template-for-update.yaml" --region ${PROD_REGION}
          TEMPLATE_URL="https://${PROD_ARTIFACTS_BUCKET}.s3.${PROD_REGION}.amazonaws.com/main-stack-template-for-update.yaml"
          # UpdateStack requires all parameters; use UsePreviousValue=true for ones we are not changing (avoids needing sensitive values).
          PARAM_KEYS=$(aws cloudformation describe-stacks --stack-name ${PROD_STACK_NAME} --region ${PROD_REGION} \
            --query 'Stacks[0].Parameters[*].ParameterKey' --output text)
          PARAM_ARGS=()
          for key in $PARAM_KEYS; do
            if [ "$key" = "CloudFrontDistributionArn" ]; then
              PARAM_ARGS+=( "ParameterKey=${key},ParameterValue=${CF_ARN}" )
            elif [ "$key" = "MapDataPublicBaseUrl" ]; then
              PARAM_ARGS+=( "ParameterKey=${key},ParameterValue=https://api.webscraper.ropegeo.com" )
            else
              PARAM_ARGS+=( "ParameterKey=${key},UsePreviousValue=true" )
            fi
          done
          set +e
          UPDATE_OUTPUT=$(aws cloudformation update-stack \
            --stack-name ${PROD_STACK_NAME} \
            --template-url "${TEMPLATE_URL}" \
            --parameters "${PARAM_ARGS[@]}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${PROD_REGION} \
            --role-arn ${PROD_CLOUDFORMATION_EXECUTION_ROLE} 2>&1)
          UPDATE_EXIT=$?
          set -e
          if [ $UPDATE_EXIT -eq 0 ]; then
            aws cloudformation wait stack-update-complete \
              --stack-name ${PROD_STACK_NAME} \
              --region ${PROD_REGION}
          elif [ $UPDATE_EXIT -eq 255 ] || [ $UPDATE_EXIT -eq 252 ]; then
            echo "Update-stack returned $UPDATE_EXIT. Output:"
            echo "$UPDATE_OUTPUT"
            echo "::error::Main stack update was a no-op. Set CloudFrontDistributionArn manually: AWS Console → CloudFormation → ${PROD_STACK_NAME} → Stack actions → Edit parameters → set CloudFrontDistributionArn to the distribution ARN → Save. Or run a full pipeline so deploy-prod-main deploys the stack with the latest template first."
            exit 1
          else
            echo "::error::Main stack update failed (exit $UPDATE_EXIT)."
            echo "$UPDATE_OUTPUT"
            exit $UPDATE_EXIT
          fi
      - name: Verify main stack has CloudFront ARN (required for docs/mapdata 403 fix)
        run: |
          ARN=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Parameters[?ParameterKey=='CloudFrontDistributionArn'].ParameterValue" \
            --output text)
          ARN=$(echo "$ARN" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$ARN" ] || [ "$ARN" = "None" ]; then
            echo "::error::Main stack CloudFrontDistributionArn is still empty. Docs and mapdata via CloudFront will return 403. Ensure PROD_CLOUDFRONT_DISTRIBUTION_ARN secret is set (no spaces/newlines) and the update step succeeded, or set the parameter manually in CloudFormation."
            exit 1
          fi
          echo "Main stack has CloudFrontDistributionArn set (docs/mapdata bucket policies allow CloudFront)."
      - name: Re-import API from OpenAPI spec
        run: |
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_API_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='WebScraperApiId'].OutputValue" \
            --output text)
          aws s3 cp s3://${{ steps.get-buckets.outputs.docs_bucket }}/openapiResolved.yaml openapiResolved.yaml
          aws apigatewayv2 reimport-api \
            --api-id "${API_ID}" \
            --body file://openapiResolved.yaml \
            --region ${PROD_REGION}

  invalidate-prod-api-cloudfront:
    if: always() && github.ref == 'refs/heads/master' && needs.deploy-prod-api.result == 'success'
    needs: [deploy-prod-api]
    runs-on: ubuntu-latest
    steps:
      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-api-cloudfront-invalidation
          role-duration-seconds: 3600
          role-skip-session-tagging: true
      - name: Create CloudFront invalidation for API routes
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_API_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          DIST_ID=$(echo "$DIST_ID" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "::error::CloudFront distribution ID not found in API stack outputs."
            exit 1
          fi
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
          echo "CloudFront invalidation created for distribution $DIST_ID (paths: /*)."

  run-migrations:
    runs-on: ubuntu-latest
    needs:
      - deploy-prod-main
      - deploy-testing-main
    if: |
      always() && (
        (github.ref == 'refs/heads/master' && (needs.deploy-prod-main.result == 'success' || needs.deploy-testing-main.result == 'success')) ||
        (startsWith(github.ref, 'refs/heads/feature'))
      )
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Install dbmate
        run: |
          curl -fsSL https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64 -o dbmate
          chmod +x dbmate
          sudo mv dbmate /usr/local/bin/

      - name: Assume the testing pipeline user role
        if: needs.deploy-testing-main.result == 'success'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-migrations
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Get dev database endpoint
        if: needs.deploy-testing-main.result == 'success'
        id: get-dev-endpoint
        run: |
          STACK_NAME=${TESTING_STACK_NAME} \
          DB_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${STACK_NAME} \
            --region ${TESTING_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='DevDatabaseEndpoint'].OutputValue" \
            --output text)
          echo "DB_ENDPOINT=${DB_ENDPOINT}" >> $GITHUB_OUTPUT
          echo "STACK_NAME=${STACK_NAME}" >> $GITHUB_OUTPUT

      - name: Run migrations on dev database
        if: needs.deploy-testing-main.result == 'success'
        env:
          DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
          DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
        run: |
          ENCODED_USER=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('DEV_DATABASE_USERNAME', ''), safe=''))")
          ENCODED_PASS=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('DEV_DATABASE_PASSWORD', ''), safe=''))")
          DB_URL="postgres://${ENCODED_USER}:${ENCODED_PASS}@${{ steps.get-dev-endpoint.outputs.DB_ENDPOINT }}:5432/dev-db?sslmode=require"
          dbmate --url "${DB_URL}" up

      - name: Assume the prod pipeline user role
        if: needs.deploy-prod-main.result == 'success'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-migrations
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Get prod bastion and database endpoint
        if: needs.deploy-prod-main.result == 'success'
        id: get-prod-bastion
        run: |
          BASTION_IP=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='BastionPublicIP'].OutputValue" \
            --output text)
          DB_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='ProductionDatabaseEndpoint'].OutputValue" \
            --output text)
          KEY_PAIR_ID=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='BastionKeyPairId'].OutputValue" \
            --output text)
          echo "BASTION_IP=${BASTION_IP}" >> $GITHUB_OUTPUT
          echo "DB_ENDPOINT=${DB_ENDPOINT}" >> $GITHUB_OUTPUT
          echo "KEY_PAIR_ID=${KEY_PAIR_ID}" >> $GITHUB_OUTPUT

      - name: Run migrations on prod database (SSH tunnel via bastion)
        if: needs.deploy-prod-main.result == 'success'
        env:
          PROD_DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}
          PROD_DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}
        run: |
          cleanup() {
            SSH_PID=$(pgrep -f "ssh.*5432:.*:5432" 2>/dev/null) || true
            [ -n "$SSH_PID" ] && kill $SSH_PID 2>/dev/null || true
            rm -f bastion_key.pem
          }
          trap cleanup EXIT
          BASTION_IP="${{ steps.get-prod-bastion.outputs.BASTION_IP }}"
          DB_ENDPOINT="${{ steps.get-prod-bastion.outputs.DB_ENDPOINT }}"
          KEY_PAIR_ID="${{ steps.get-prod-bastion.outputs.KEY_PAIR_ID }}"
          if [ -z "$BASTION_IP" ] || [ -z "$DB_ENDPOINT" ] || [ -z "$KEY_PAIR_ID" ]; then
            echo "Missing BASTION_IP, DB_ENDPOINT, or KEY_PAIR_ID from stack outputs."
            exit 1
          fi
          aws ssm get-parameter --name "/ec2/keypair/${KEY_PAIR_ID}" --with-decryption --query Parameter.Value --output text --region ${PROD_REGION} > bastion_key.pem
          chmod 600 bastion_key.pem
          for i in $(seq 1 18); do
            if ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i bastion_key.pem -f -N -L 5432:${DB_ENDPOINT}:5432 ec2-user@${BASTION_IP}; then
              break
            fi
            [ $i -eq 18 ] && { echo "SSH tunnel failed after 18 attempts."; exit 1; }
            echo "Bastion may still be booting, retrying in 10s..."; sleep 10
          done
          sleep 2
          ENCODED_USER=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('PROD_DATABASE_USERNAME', ''), safe=''))")
          ENCODED_PASS=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('PROD_DATABASE_PASSWORD', ''), safe=''))")
          DB_URL="postgres://${ENCODED_USER}:${ENCODED_PASS}@127.0.0.1:5432/productiondb?sslmode=require"
          dbmate --url "${DB_URL}" up
