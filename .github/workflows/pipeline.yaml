name: Pipeline

on:
  push:
    branches:
      - 'master'

env:
  PIPELINE_USER_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  PIPELINE_USER_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SAM_TEMPLATE: template.yaml
  TESTING_STACK_NAME: WebScraper
  TESTING_PIPELINE_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-dev-pipel-PipelineExecutionRole-H6pcsIlT1GzO
  TESTING_CLOUDFORMATION_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-dev-p-CloudFormationExecutionRo-tEPpCOWZDOCO
  TESTING_ARTIFACTS_BUCKET: aws-sam-cli-managed-dev-pipeline-r-artifactsbucket-vab3mw03pxxb
  # If there are functions with "Image" PackageType in your template,
  # uncomment the line below and add "--image-repository ${TESTING_IMAGE_REPOSITORY}" to
  # testing "sam package" and "sam deploy" commands.
  # TESTING_IMAGE_REPOSITORY = '0123456789.dkr.ecr.region.amazonaws.com/repository-name'
  TESTING_REGION: us-east-1
  PROD_STACK_NAME: WebScraper-Prod
  PROD_PIPELINE_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-productio-PipelineExecutionRole-FRy7F5j0k91U
  PROD_CLOUDFORMATION_EXECUTION_ROLE: arn:aws:iam::410170143634:role/aws-sam-cli-managed-produ-CloudFormationExecutionRo-YIlb8V9GNR1Y
  PROD_ARTIFACTS_BUCKET: aws-sam-cli-managed-production-pip-artifactsbucket-ixo4vubbqj28
  # If there are functions with "Image" PackageType in your template,
  # uncomment the line below and add "--image-repository ${PROD_IMAGE_REPOSITORY}" to
  # prod "sam package" and "sam deploy" commands.
  # PROD_IMAGE_REPOSITORY = '0123456789.dkr.ecr.region.amazonaws.com/repository-name'
  PROD_REGION: us-east-1
  DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
  DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
  PROD_DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}
  PROD_DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: node:20-bookworm-slim
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: testPass
          POSTGRES_USER: testUser
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI docs
        run: npm run lint:openapi

      - name: Install chrome
        run: npx puppeteer browsers install chrome

      - name: Install missing packages
        run: apt-get update; apt install -y gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils wget

      - name: Run database migrations
        run: npx dbmate --url postgres://testUser:testPass@postgres:5432/test?sslmode=disable up

      - name: Run all tests
        run: npm run test:deploy
        env:
          TEST_USER: testUser
          TEST_PASS: testPass
          TEST_HOST: postgres
          TEST_PORT: 5432
          TEST_DB: test

  delete-feature:
    if: startsWith(github.event.ref, 'feature') && github.event_name == 'delete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-packaging
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Delete feature branch stack
        env:
          FEATURE_BRANCH_NAME: ${{ github.event.ref }}
        run: |
          sam delete \
            --stack-name $(echo ${FEATURE_BRANCH_NAME##*/} | tr -cd '[a-zA-Z0-9-]') \
            --region ${TESTING_REGION} \
            --no-prompts

  build-and-deploy-feature:
    # this stage is triggered only for feature branches (feature*),
    # which will build the stack and deploy to a stack named with branch name.
    # https://github.com/actions/setup-python
    # https://github.com/aws-actions/configure-aws-credentials#notice-node12-deprecation-warning
    if: startsWith(github.ref, 'refs/heads/feature')
    needs: [test]
    # Use arm64 runner so MapDataProcessor's arm64 build image runs natively (avoids slow QEMU emulation on x86_64).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      # MapDataProcessor is arm64 and includes a native tippecanoe binary; it must be built in an arm64 container.
      - run: sam build --template ${SAM_TEMPLATE} --use-container --build-image public.ecr.aws/sam/build-nodejs22.x --build-image MapDataProcessor=public.ecr.aws/sam/build-nodejs22.x:latest-arm64

      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: feature-deployment
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Deploy to feature stack in the testing account
        env:
          DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
          DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        shell: bash
        run: |
          if [ -z "$DEV_DATABASE_USERNAME" ] || [ -z "$DEV_DATABASE_PASSWORD" ]; then
            echo "Error: DEV_DATABASE_USERNAME and DEV_DATABASE_PASSWORD must be set as repository secrets."
            exit 1
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "Error: PROXY_URL must be set as a repository secret for dev deployment."
            exit 1
          fi
          FCK_NAT_AMI=$(aws ec2 describe-images --owners 568608671756 \
            --filters "Name=name,Values=fck-nat-al2023-*" "Name=architecture,Values=arm64" \
            --query "sort_by(Images,&CreationDate)[-1].ImageId" --output text \
            --region ${TESTING_REGION})
          sam deploy --config-env ci \
            --stack-name $(echo ${GITHUB_REF##*/} | tr -cd '[a-zA-Z0-9-]') \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${TESTING_REGION} \
            --s3-bucket ${TESTING_ARTIFACTS_BUCKET} \
            --no-fail-on-empty-changeset \
            --role-arn ${TESTING_CLOUDFORMATION_EXECUTION_ROLE} \
            --parameter-overrides "devEnvironment=dev DatabaseUsername=$DEV_DATABASE_USERNAME DatabasePassword=$DEV_DATABASE_PASSWORD FckNatAMIId=$FCK_NAT_AMI ProxyUrl=$PROXY_URL"

  delete-feature-stack-on-failure:
    if: always() && startsWith(github.ref, 'refs/heads/feature') && needs.build-and-deploy-feature.result == 'failure'
    needs: [build-and-deploy-feature]
    runs-on: ubuntu-latest
    steps:
      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: feature-cleanup
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Delete failed feature stack
        env:
          FEATURE_STACK_NAME: $(echo ${GITHUB_REF##*/} | tr -cd '[a-zA-Z0-9-]')
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name ${FEATURE_STACK_NAME} --region ${TESTING_REGION} --query 'Stacks[0].StackStatus' --output text 2>/dev/null) || true
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack ${FEATURE_STACK_NAME} is ROLLBACK_COMPLETE; deleting so the next run can create a fresh stack."
            aws cloudformation delete-stack --stack-name ${FEATURE_STACK_NAME} --region ${TESTING_REGION}
            echo "Stack delete initiated. Re-run the pipeline to deploy again."
          else
            echo "Stack status is '${STATUS:-stack may not exist}'; not deleting (only ROLLBACK_COMPLETE stacks are deleted)."
          fi

  build-and-package:
    if: github.ref == 'refs/heads/master'
    needs: [test]
    # Use arm64 runner so MapDataProcessor's arm64 build image runs natively (avoids slow QEMU emulation on x86_64).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # MapDataProcessor is arm64 and includes a native tippecanoe binary; it must be built in an arm64 container.
      - name: Build resources
        run: sam build --template ${SAM_TEMPLATE} --use-container --build-image public.ecr.aws/sam/build-nodejs22.x --build-image MapDataProcessor=public.ecr.aws/sam/build-nodejs22.x:latest-arm64

      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-packaging
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Upload artifacts to testing artifact buckets
        run: |
          sam package \
            --config-env ci \
            --s3-bucket ${TESTING_ARTIFACTS_BUCKET} \
            --region ${TESTING_REGION} \
            --output-template-file packaged-testing.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-testing.yaml
          path: packaged-testing.yaml

      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-packaging
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Upload artifacts to production artifact buckets
        run: |
          sam package \
            --config-env ci \
            --s3-bucket ${PROD_ARTIFACTS_BUCKET} \
            --region ${PROD_REGION} \
            --output-template-file packaged-prod.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-prod.yaml
          path: packaged-prod.yaml

  deploy-testing:
    # Disabled for now; set to "github.ref == 'refs/heads/master'" to re-enable
    if: false
    needs: [build-and-package, upload-api-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/download-artifact@v4
        with:
          name: packaged-testing.yaml

      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-deployment
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Deploy to testing account
        env:
          DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
          DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$DEV_DATABASE_USERNAME" ] || [ -z "$DEV_DATABASE_PASSWORD" ]; then
            echo "Error: DEV_DATABASE_USERNAME and DEV_DATABASE_PASSWORD must be set as repository secrets."
            exit 1
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "Error: PROXY_URL must be set as a repository secret for dev deployment."
            exit 1
          fi
          FCK_NAT_AMI=$(aws ec2 describe-images --owners 568608671756 \
            --filters "Name=name,Values=fck-nat-al2023-*" "Name=architecture,Values=arm64" \
            --query "sort_by(Images,&CreationDate)[-1].ImageId" --output text \
            --region ${TESTING_REGION})
          sam deploy --config-env ci \
            --stack-name ${TESTING_STACK_NAME} \
            --template packaged-testing.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${TESTING_REGION} \
            --s3-bucket ${TESTING_ARTIFACTS_BUCKET} \
            --no-fail-on-empty-changeset \
            --role-arn ${TESTING_CLOUDFORMATION_EXECUTION_ROLE} \
            --parameter-overrides "devEnvironment=dev DatabaseUsername=$DEV_DATABASE_USERNAME DatabasePassword=$DEV_DATABASE_PASSWORD FckNatAMIId=$FCK_NAT_AMI ProxyUrl=$PROXY_URL"

  delete-testing-stack-on-failure:
    if: always() && github.ref == 'refs/heads/master' && needs.deploy-testing.result == 'failure'
    needs: [deploy-testing]
    runs-on: ubuntu-latest
    steps:
      - name: Assume the testing pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-cleanup
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Delete failed testing (dev) stack
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name ${TESTING_STACK_NAME} --region ${TESTING_REGION} --query 'Stacks[0].StackStatus' --output text 2>/dev/null) || true
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack ${TESTING_STACK_NAME} is ROLLBACK_COMPLETE; deleting so the next run can create a fresh stack."
            aws cloudformation delete-stack --stack-name ${TESTING_STACK_NAME} --region ${TESTING_REGION}
            echo "Stack delete initiated. Re-run the pipeline to deploy again."
          else
            echo "Stack status is '${STATUS:-stack may not exist}'; not deleting (only ROLLBACK_COMPLETE stacks are deleted)."
          fi

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    needs: [build-and-package, upload-api-docs]
    runs-on: ubuntu-latest
    # Configure GitHub Action Environment to have a manual approval step before deployment to production
    # https://docs.github.com/en/actions/reference/environments
    # environment: <configured-environment>
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/download-artifact@v4
        with:
          name: packaged-prod.yaml

      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-deployment
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Deploy to production account
        env:
          PROD_DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}
          PROD_DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROD_DATABASE_USERNAME" ] || [ -z "$PROD_DATABASE_PASSWORD" ]; then
            echo "Error: PROD_DATABASE_USERNAME and PROD_DATABASE_PASSWORD must be set as repository secrets."
            exit 1
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "Error: PROXY_URL must be set as a repository secret for production deployment."
            exit 1
          fi
          FCK_NAT_AMI=$(aws ec2 describe-images --owners 568608671756 \
            --filters "Name=name,Values=fck-nat-al2023-*" "Name=architecture,Values=arm64" \
            --query "sort_by(Images,&CreationDate)[-1].ImageId" --output text \
            --region ${PROD_REGION})
          sam deploy --config-env ci \
            --stack-name ${PROD_STACK_NAME} \
            --template packaged-prod.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${PROD_REGION} \
            --s3-bucket ${PROD_ARTIFACTS_BUCKET} \
            --no-fail-on-empty-changeset \
            --role-arn ${PROD_CLOUDFORMATION_EXECUTION_ROLE} \
            --parameter-overrides "devEnvironment=production DatabaseUsername=$PROD_DATABASE_USERNAME DatabasePassword=$PROD_DATABASE_PASSWORD FckNatAMIId=$FCK_NAT_AMI ProxyUrl=$PROXY_URL"

  upload-api-docs:
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build OpenAPI docs with Redocly
        run: |
          npx @redocly/cli build-docs openapi-docs/index.yaml --output docs-build/index.html
          npx @redocly/cli bundle openapi-docs/index.yaml --output docs-build/openapi.yaml
          npx @redocly/cli bundle openapi-docs/index.yaml --output docs-build/openapi.json

      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: upload-api-docs
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Get docs bucket name
        id: get-docs-bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='DocsBucketName'].OutputValue" \
            --output text)
          echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT

      - name: Upload docs to S3
        run: |
          aws s3 sync docs-build s3://${{ steps.get-docs-bucket.outputs.bucket }} --delete

  delete-prod-stack-on-failure:
    if: always() && github.ref == 'refs/heads/master' && needs.deploy-prod.result == 'failure'
    needs: [deploy-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Assume the prod pipeline user role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-cleanup
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Delete failed production stack
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name ${PROD_STACK_NAME} --region ${PROD_REGION} --query 'Stacks[0].StackStatus' --output text 2>/dev/null) || true
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack ${PROD_STACK_NAME} is ROLLBACK_COMPLETE; deleting so the next run can create a fresh stack."
            aws cloudformation delete-stack --stack-name ${PROD_STACK_NAME} --region ${PROD_REGION}
            echo "Stack delete initiated. Re-run the pipeline to deploy again."
          else
            echo "Stack status is '${STATUS:-stack may not exist}'; not deleting (only ROLLBACK_COMPLETE stacks are deleted)."
          fi

  run-migrations:
    runs-on: ubuntu-latest
    needs: 
      - deploy-prod
      - deploy-testing
      - build-and-deploy-feature
    if: |
      always() && (
        (github.ref == 'refs/heads/master' && (needs.deploy-prod.result == 'success' || needs.deploy-testing.result == 'success')) ||
        (startsWith(github.ref, 'refs/heads/feature') && needs.build-and-deploy-feature.result == 'success')
      )
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Install dbmate
        run: |
          curl -fsSL https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64 -o dbmate
          chmod +x dbmate
          sudo mv dbmate /usr/local/bin/

      - name: Assume the testing pipeline user role
        if: needs.deploy-testing.result == 'success' || needs.build-and-deploy-feature.result == 'success'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TESTING_REGION }}
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          role-session-name: testing-migrations
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Get dev database endpoint
        if: needs.deploy-testing.result == 'success' || needs.build-and-deploy-feature.result == 'success'
        id: get-dev-endpoint
        run: |
          if [ "${{ needs.build-and-deploy-feature.result }}" == "success" ]; then
            STACK_NAME=$(echo ${GITHUB_REF##*/} | tr -cd '[a-zA-Z0-9-]')
          else
            STACK_NAME=${TESTING_STACK_NAME}
          fi
          DB_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${STACK_NAME} \
            --region ${TESTING_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='DevDatabaseEndpoint'].OutputValue" \
            --output text)
          echo "DB_ENDPOINT=${DB_ENDPOINT}" >> $GITHUB_OUTPUT
          echo "STACK_NAME=${STACK_NAME}" >> $GITHUB_OUTPUT

      - name: Run migrations on dev database
        if: needs.deploy-testing.result == 'success' || needs.build-and-deploy-feature.result == 'success'
        env:
          DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
          DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
        run: |
          ENCODED_USER=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('DEV_DATABASE_USERNAME', ''), safe=''))")
          ENCODED_PASS=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('DEV_DATABASE_PASSWORD', ''), safe=''))")
          DB_URL="postgres://${ENCODED_USER}:${ENCODED_PASS}@${{ steps.get-dev-endpoint.outputs.DB_ENDPOINT }}:5432/dev-db?sslmode=require"
          dbmate --url "${DB_URL}" up

      - name: Assume the prod pipeline user role
        if: needs.deploy-prod.result == 'success'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.PIPELINE_USER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.PIPELINE_USER_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PROD_REGION }}
          role-to-assume: ${{ env.PROD_PIPELINE_EXECUTION_ROLE }}
          role-session-name: prod-migrations
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Get prod bastion and database endpoint
        if: needs.deploy-prod.result == 'success'
        id: get-prod-bastion
        run: |
          BASTION_IP=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='BastionPublicIP'].OutputValue" \
            --output text)
          DB_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='ProductionDatabaseEndpoint'].OutputValue" \
            --output text)
          KEY_PAIR_ID=$(aws cloudformation describe-stacks \
            --stack-name ${PROD_STACK_NAME} \
            --region ${PROD_REGION} \
            --query "Stacks[0].Outputs[?OutputKey=='BastionKeyPairId'].OutputValue" \
            --output text)
          echo "BASTION_IP=${BASTION_IP}" >> $GITHUB_OUTPUT
          echo "DB_ENDPOINT=${DB_ENDPOINT}" >> $GITHUB_OUTPUT
          echo "KEY_PAIR_ID=${KEY_PAIR_ID}" >> $GITHUB_OUTPUT

      - name: Run migrations on prod database (SSH tunnel via bastion)
        if: needs.deploy-prod.result == 'success'
        env:
          PROD_DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}
          PROD_DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}
        run: |
          cleanup() {
            SSH_PID=$(pgrep -f "ssh.*5432:.*:5432" 2>/dev/null) || true
            [ -n "$SSH_PID" ] && kill $SSH_PID 2>/dev/null || true
            rm -f bastion_key.pem
          }
          trap cleanup EXIT
          BASTION_IP="${{ steps.get-prod-bastion.outputs.BASTION_IP }}"
          DB_ENDPOINT="${{ steps.get-prod-bastion.outputs.DB_ENDPOINT }}"
          KEY_PAIR_ID="${{ steps.get-prod-bastion.outputs.KEY_PAIR_ID }}"
          if [ -z "$BASTION_IP" ] || [ -z "$DB_ENDPOINT" ] || [ -z "$KEY_PAIR_ID" ]; then
            echo "Missing BASTION_IP, DB_ENDPOINT, or KEY_PAIR_ID from stack outputs."
            exit 1
          fi
          aws ssm get-parameter --name "/ec2/keypair/${KEY_PAIR_ID}" --with-decryption --query Parameter.Value --output text --region ${PROD_REGION} > bastion_key.pem
          chmod 600 bastion_key.pem
          for i in $(seq 1 18); do
            if ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i bastion_key.pem -f -N -L 5432:${DB_ENDPOINT}:5432 ec2-user@${BASTION_IP}; then
              break
            fi
            [ $i -eq 18 ] && { echo "SSH tunnel failed after 18 attempts."; exit 1; }
            echo "Bastion may still be booting, retrying in 10s..."; sleep 10
          done
          sleep 2
          ENCODED_USER=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('PROD_DATABASE_USERNAME', ''), safe=''))")
          ENCODED_PASS=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('PROD_DATABASE_PASSWORD', ''), safe=''))")
          DB_URL="postgres://${ENCODED_USER}:${ENCODED_PASS}@127.0.0.1:5432/productiondb?sslmode=require"
          dbmate --url "${DB_URL}" up
