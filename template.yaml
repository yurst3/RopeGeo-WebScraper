AWSTemplateFormatVersion: 2010-09-09
Description: >-
  WebScraper
Transform:
- AWS::Serverless-2016-10-31

Parameters:
  devEnvironment:
    Type: String
    Description: Environment name (dev or production)
    AllowedValues:
      - dev
      - production
  
  DatabaseUsername:
    Type: String
    Description: Master username for the RDS database
    Default: admin
    NoEcho: false
  
  DatabasePassword:
    Type: String
    Description: Master password for the RDS database
    NoEcho: true
    MinLength: 8

  FckNatAMIId:
    Type: AWS::EC2::Image::Id
    Description: >
      fck-nat AMI ID for this region (arm64).
      Look up with: aws ec2 describe-images --owners 568608671756 --filters "Name=name,Values=fck-nat-al2023-*" "Name=architecture,Values=arm64" --query "sort_by(Images,&CreationDate)[-1].ImageId" --output text

Conditions:
  IsProduction: !Equals [!Ref devEnvironment, production]

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:
  # VPC for RDS and Lambda
  WebScraperVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebScraperVPC

  # Private Subnet 1 (for RDS and Lambda)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebScraperVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: WebScraperPrivateSubnet1

  # Private Subnet 2 (for RDS Proxy - requires 2 subnets in different AZs)
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebScraperVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select 
        - 1
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: WebScraperPrivateSubnet2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebScraperInternetGateway

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref WebScraperVPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebScraperVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: WebScraperPublicSubnet1

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebScraperVPC
      Tags:
        - Key: Name
          Value: WebScraperPublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # fck-nat (NAT instance) for Lambda egress - https://fck-nat.dev/stable/deploying/
  FckNatSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for fck-nat NAT instance
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - CidrIp: 10.0.0.0/16
          IpProtocol: '-1'
          Description: Allow all traffic from VPC
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: '-1'
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat-sg'

  FckNatRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AttachNatEniPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AttachNetworkInterface
                  - ec2:ModifyNetworkInterfaceAttribute
                Resource: '*'
        - PolicyName: AssociateNatAddressPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat-role'

  FckNatInterface:
    Type: AWS::EC2::NetworkInterface
    DependsOn: FckNatSecurityGroup
    Properties:
      Description: fck-nat gateway interface
      SubnetId: !Ref PublicSubnet1
      GroupSet:
        - !GetAtt FckNatSecurityGroup.GroupId
      SourceDestCheck: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat-eni'

  FckNatAsgInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref FckNatRole
      InstanceProfileName: !Sub '${AWS::StackName}-fck-nat-profile'

  FckNatLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    DependsOn:
      - FckNatRole
      - FckNatAsgInstanceProfile
    Properties:
      LaunchTemplateData:
        ImageId: !Ref FckNatAMIId
        InstanceType: t4g.nano
        IamInstanceProfile:
          Name: !Ref FckNatAsgInstanceProfile
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            Groups:
              - !GetAtt FckNatSecurityGroup.GroupId
            SubnetId: !Ref PublicSubnet1
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            echo "eni_id=${FckNatInterface}" >> /etc/fck-nat.conf
            service fck-nat restart

  FckNatAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: FckNatLaunchTemplate
    Properties:
      MaxSize: '1'
      MinSize: '1'
      DesiredCapacity: '1'
      LaunchTemplate:
        LaunchTemplateId: !Ref FckNatLaunchTemplate
        Version: !GetAtt FckNatLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat'
          PropagateAtLaunch: true
    UpdatePolicy:
      AutoScalingScheduledAction:
        IgnoreUnmodifiedGroupSizeProperties: true

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebScraperVPC
      Tags:
        - Key: Name
          Value: WebScraperPrivateRouteTable

  PrivateRoute:
    Type: AWS::EC2::Route
    DependsOn: FckNatInterface
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NetworkInterfaceId: !Ref FckNatInterface

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # Security Group for Lambda
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref WebScraperVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: WebScraperLambdaSecurityGroup

  # Security Group for RDS
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS database
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Allow PostgreSQL access from Lambda
      Tags:
        - Key: Name
          Value: WebScraperRDSSecurityGroup

  # DB Subnet Group (RDS requires subnets in at least 2 AZs)
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS PostgreSQL instance
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: WebScraperDBSubnetGroup

  # RDS PostgreSQL Instance
  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${devEnvironment}-db'
      Engine: postgres
      EngineVersion: '18.1'
      DBInstanceClass: !If [IsProduction, db.t4g.small, db.t4g.micro]
      AllocatedStorage: 20
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      DBName: !Sub '${devEnvironment}db'
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      StorageType: gp3
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      EnablePerformanceInsights: false
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-db'

  # Security Group for RDS Proxy (production only)
  RDSProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsProduction
    Properties:
      GroupDescription: Security group for RDS Proxy
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Allow PostgreSQL access from Lambda
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref RDSSecurityGroup
          Description: Allow PostgreSQL access to RDS
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-rds-proxy-sg'

  # Secrets Manager secret for RDS Proxy authentication (production only)
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Condition: IsProduction
    Properties:
      Name: !Sub '${devEnvironment}-db-credentials'
      Description: Database credentials for RDS Proxy
      SecretString: !Sub |
        {
          "username": "${DatabaseUsername}",
          "password": "${DatabasePassword}"
        }

  # IAM Role for RDS Proxy (production only)
  RDSProxyRole:
    Type: AWS::IAM::Role
    Condition: IsProduction
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-rds-proxy-role'

  # RDS Proxy (production only)
  RDSProxy:
    Type: AWS::RDS::DBProxy
    Condition: IsProduction
    DependsOn:
      - Database
      - DatabaseSecret
      - RDSProxyRole
      - RDSProxySecurityGroup
    Properties:
      DBProxyName: !Sub '${devEnvironment}-db-proxy'
      EngineFamily: POSTGRESQL
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref DatabaseSecret
          IAMAuth: DISABLED
      RoleArn: !GetAtt RDSProxyRole.Arn
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      VpcSecurityGroupIds:
        - !Ref RDSProxySecurityGroup
      RequireTLS: true
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-db-proxy'

  # RDS Proxy Target Group (production only)
  RDSProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Condition: IsProduction
    DependsOn:
      - RDSProxy
      - Database
    Properties:
      DBProxyName: !Ref RDSProxy
      TargetGroupName: default
      DBClusterIdentifiers: []
      DBInstanceIdentifiers:
        - !Ref Database
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: 100
        MaxIdleConnectionsPercent: 50
        ConnectionBorrowTimeout: 120
        SessionPinningFilters: []
        InitQuery: ''

  ChromiumLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      Description: Chromium with Node.js integration for AWS Lambda
      ContentUri: layers/chromium
      CompatibleRuntimes:
        - &nodejsRuntime nodejs22.x
      CompatibleArchitectures:
        - &chromiumArch arm64
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: makefile
      BuildArchitecture: *chromiumArch

  # SQS Queue for Ropewiki page processing
  RopewikiPageProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${devEnvironment}-ropewiki-page-processing-queue'
      VisibilityTimeout: 960
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 5

  # SQS Queue for map data processing
  MapDataProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${devEnvironment}-map-data-processing-queue'
      VisibilityTimeout: 960
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 5

  # S3 Bucket for storing map data files
  MapDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${devEnvironment}-map-data-bucket'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Lambda function that scrapes ALL Ropewiki pages and stores them in the database
  RopewikiScraper:
    Type: AWS::Serverless::Function
    Properties:
      Description: A Lambda function that scrapes Ropewiki pages and stores them in the database
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Handler: src/ropewiki/lambda-handlers/mainHandler.mainHandler
      # This property associates this Lambda function with a scheduled CloudWatch Event. For all available properties, see
      # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#schedule
      # This runs once a week on Sunday at midnight UTC.
      Events:
        CloudWatchEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 ? * SUN *)
      MemorySize: 1024
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
      Environment:
        Variables:
          DEV_ENVIRONMENT: !Ref devEnvironment
          AWS_REGION: !Ref AWS::Region
          DB_HOST: !If [IsProduction, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
          DB_PORT: !GetAtt Database.Endpoint.Port
          DB_NAME: !Sub '${devEnvironment}db'
          DB_USER: !Ref DatabaseUsername
          DB_PASSWORD: !Ref DatabasePassword
          ROPEWIKI_PAGE_PROCESSING_QUEUE_URL: !Ref RopewikiPageProcessingQueue
          MAP_DATA_PROCESSING_QUEUE_URL: !Ref MapDataProcessingQueue
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt RopewikiPageProcessingQueue.QueueName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt MapDataProcessingQueue.QueueName
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "esnext"
        Sourcemap: true
        EntryPoints: 
        - src/ropewiki/lambda-handlers/mainHandler.ts
        External:
        - "@sparticuz/chromium"

  # Lambda function that processes individual Ropewiki pages
  RopewikiPageProcessor:
    Type: AWS::Serverless::Function
    Properties:
      Description: A Lambda function that processes individual Ropewiki pages (beta sections and images)
      Runtime: nodejs22.x
      Architectures:
        - *chromiumArch
      Layers:
        - !Ref ChromiumLayer
      Handler: src/ropewiki/lambda-handlers/processPageHandler.processPageHandler
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt RopewikiPageProcessingQueue.Arn
            BatchSize: 10
      MemorySize: 1024
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
      Environment:
        Variables:
          DEV_ENVIRONMENT: !Ref devEnvironment
          AWS_REGION: !Ref AWS::Region
          DB_HOST: !If [IsProduction, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
          DB_PORT: !GetAtt Database.Endpoint.Port
          DB_NAME: !Sub '${devEnvironment}db'
          DB_USER: !Ref DatabaseUsername
          DB_PASSWORD: !Ref DatabasePassword
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "esnext"
        Sourcemap: true
        EntryPoints: 
        - src/ropewiki/lambda-handlers/processPageHandler.ts
        External:
        - "@sparticuz/chromium"

  # Lambda function that processes map data (KML to MBTiles conversion)
  # Uses arm64 (no Chromium dependency). RopewikiScraper/RopewikiPageProcessor use x86_64 for Chromium layer.
  MapDataProcessor:
    Type: AWS::Serverless::Function
    Properties:
      Description: A Lambda function that processes map data by converting KML files to MBTiles
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Handler: src/map-data/lambda-handlers/mainHandler.mainHandler
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt MapDataProcessingQueue.Arn
            BatchSize: 10
      MemorySize: 1024
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
      Environment:
        Variables:
          DEV_ENVIRONMENT: !Ref devEnvironment
          AWS_REGION: !Ref AWS::Region
          DB_HOST: !If [IsProduction, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
          DB_PORT: !GetAtt Database.Endpoint.Port
          DB_NAME: !Sub '${devEnvironment}db'
          DB_USER: !Ref DatabaseUsername
          DB_PASSWORD: !Ref DatabasePassword
          MAP_DATA_BUCKET_NAME: !Ref MapDataBucket
      Policies:
        - S3WritePolicy:
            BucketName: !Ref MapDataBucket
    Metadata:
      BuildMethod: makefile

# # More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Tracing: Active
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true
