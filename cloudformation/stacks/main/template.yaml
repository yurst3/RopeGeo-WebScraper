AWSTemplateFormatVersion: 2010-09-09
Description: >-
  WebScraper
Transform:
- AWS::Serverless-2016-10-31

Parameters:
  devEnvironment:
    Type: String
    Description: Environment name (dev or production)
    AllowedValues:
      - dev
      - production
  
  DatabaseUsername:
    Type: String
    Description: Master username for the RDS database
    Default: admin
    NoEcho: false
  
  DatabasePassword:
    Type: String
    Description: Master password for the RDS database
    NoEcho: true
    MinLength: 8

  FckNatAMIId:
    Type: AWS::EC2::Image::Id
    Description: >
      fck-nat AMI ID for this region (arm64).
      Look up with: aws ec2 describe-images --owners 568608671756 --filters "Name=name,Values=fck-nat-al2023-*" "Name=architecture,Values=arm64" --query "sort_by(Images,&CreationDate)[-1].ImageId" --output text

  ProxyUrl:
    Type: String
    Description: URL of HTTP proxy for Lambda egress when DEV_ENVIRONMENT is dev or production (e.g. http://host:port)
    NoEcho: true

  DocsBucketPipelineRoleArn:
    Type: String
    Description: IAM role ARN allowed to upload docs to the docs bucket (e.g. pipeline execution role for upload-api-docs). Leave blank to skip bucket policy.
    Default: ''
  PipelineExecutionRoleName:
    Type: String
    Description: IAM role name (not ARN) of the pipeline execution role; used to attach the ECR push policy so build-push-fargate-jobs can push images. Leave blank to skip attachment (attach FargateJobsECRPushPolicyArn manually if needed).
    Default: ''
  CloudFrontDistributionArn:
    Type: String
    Description: CloudFront distribution ARN (from API stack CloudFrontDistributionArn output). When set, Docs bucket allows GetObject from CloudFront only in addition to ApiGateway/pipeline. Deploy API stack first, then update main with this value.
    Default: ''
  MapDataPublicBaseUrl:
    Type: String
    Description: Public base URL for map data (e.g. https://api.webscraper.ropegeo.com). When set, GeoJSON/vector tile URLs use this instead of S3; use the CloudFront URL so traffic goes through CloudFront.
    Default: ''

Conditions:
  HasDocsBucketPipelineRole: !Not [!Equals [!Ref DocsBucketPipelineRoleArn, '']]
  HasPipelineExecutionRoleName: !Not [!Equals [!Ref PipelineExecutionRoleName, '']]
  HasCloudFrontDistribution: !Not [!Equals [!Ref CloudFrontDistributionArn, '']]
  IsProduction: !Equals [!Ref devEnvironment, production]
  IsDev: !Equals [!Ref devEnvironment, dev]

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:
  # VPC for RDS and Lambda
  WebScraperVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebScraperVPC

  # Private Subnet 1 (for RDS and Lambda)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebScraperVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: WebScraperPrivateSubnet1

  # Private Subnet 2 (for RDS Proxy - requires 2 subnets in different AZs)
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebScraperVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select 
        - 1
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: WebScraperPrivateSubnet2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebScraperInternetGateway

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref WebScraperVPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebScraperVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: WebScraperPublicSubnet1

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebScraperVPC
      Tags:
        - Key: Name
          Value: WebScraperPublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # fck-nat (NAT instance) for Lambda egress - https://fck-nat.dev/stable/deploying/
  FckNatSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for fck-nat NAT instance
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - CidrIp: 10.0.0.0/16
          IpProtocol: '-1'
          Description: Allow all traffic from VPC
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: '-1'
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat-sg'

  FckNatRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AttachNatEniPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AttachNetworkInterface
                  - ec2:ModifyNetworkInterfaceAttribute
                Resource: '*'
        - PolicyName: AssociateNatAddressPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat-role'

  FckNatInterface:
    Type: AWS::EC2::NetworkInterface
    DependsOn: FckNatSecurityGroup
    Properties:
      Description: fck-nat gateway interface
      SubnetId: !Ref PublicSubnet1
      GroupSet:
        - !GetAtt FckNatSecurityGroup.GroupId
      SourceDestCheck: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat-eni'

  FckNatAsgInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref FckNatRole
      InstanceProfileName: !Sub '${AWS::StackName}-fck-nat-profile'

  FckNatLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    DependsOn:
      - FckNatRole
      - FckNatAsgInstanceProfile
    Properties:
      LaunchTemplateData:
        ImageId: !Ref FckNatAMIId
        InstanceType: t4g.nano
        IamInstanceProfile:
          Name: !Ref FckNatAsgInstanceProfile
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            Groups:
              - !GetAtt FckNatSecurityGroup.GroupId
            SubnetId: !Ref PublicSubnet1
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            echo "eni_id=${FckNatInterface}" >> /etc/fck-nat.conf
            service fck-nat restart

  FckNatAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: FckNatLaunchTemplate
    Properties:
      MaxSize: '1'
      MinSize: '1'
      DesiredCapacity: '1'
      LaunchTemplate:
        LaunchTemplateId: !Ref FckNatLaunchTemplate
        Version: !GetAtt FckNatLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-fck-nat'
          PropagateAtLaunch: true
    UpdatePolicy:
      AutoScalingScheduledAction:
        IgnoreUnmodifiedGroupSizeProperties: true

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebScraperVPC
      Tags:
        - Key: Name
          Value: WebScraperPrivateRouteTable

  PrivateRoute:
    Type: AWS::EC2::Route
    DependsOn: FckNatInterface
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NetworkInterfaceId: !Ref FckNatInterface

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # Security Group for Lambda
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref WebScraperVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: WebScraperLambdaSecurityGroup

  # Security Group for SQS VPC endpoint (allows Lambda to reach the endpoint)
  SQSEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SQS VPC interface endpoint
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Allow HTTPS from Lambda to SQS endpoint
      Tags:
        - Key: Name
          Value: WebScraperSQSEndpointSecurityGroup

  # SQS interface endpoint so Lambda can reach SQS without NAT (avoids getaddrinfo EBUSY under load)
  SQSEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref WebScraperVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sqs'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref SQSEndpointSecurityGroup

  # S3 Gateway endpoint so Lambda can reach S3 (e.g. MapDataBucket) without NAT (avoids DNS/connection pressure)
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref WebScraperVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  # Security Group for RDS
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS database
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Allow PostgreSQL access from Lambda
      Tags:
        - Key: Name
          Value: WebScraperRDSSecurityGroup

  # DB Subnet Group (RDS requires subnets in at least 2 AZs)
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS PostgreSQL instance
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: WebScraperDBSubnetGroup

  # RDS PostgreSQL Instance
  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${devEnvironment}-db'
      Engine: postgres
      EngineVersion: '18.1'
      DBInstanceClass: !If [IsProduction, db.t4g.small, db.t4g.micro]
      AllocatedStorage: 20
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      DBName: !Sub '${devEnvironment}db'
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      StorageType: gp3
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      EnablePerformanceInsights: false
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-db'

  # Allow RDS Proxy to connect to RDS (production only; proxy needs this for target registration)
  RDSProxyToRDSIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProduction
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref RDSProxySecurityGroup
      Description: Allow PostgreSQL access from RDS Proxy

  # Security Group for RDS Proxy (production only)
  RDSProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsProduction
    Properties:
      GroupDescription: Security group for RDS Proxy
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Allow PostgreSQL access from Lambda
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref RDSSecurityGroup
          Description: Allow PostgreSQL access to RDS
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-rds-proxy-sg'

  # Secrets Manager secret for RDS Proxy authentication (production only)
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Condition: IsProduction
    Properties:
      Name: !Sub '${devEnvironment}-db-credentials'
      Description: Database credentials for RDS Proxy
      SecretString: !Sub |
        {
          "username": "${DatabaseUsername}",
          "password": "${DatabasePassword}"
        }

  # IAM Role for RDS Proxy (production only)
  RDSProxyRole:
    Type: AWS::IAM::Role
    Condition: IsProduction
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-rds-proxy-role'

  # RDS Proxy (production only)
  RDSProxy:
    Type: AWS::RDS::DBProxy
    Condition: IsProduction
    DependsOn:
      - Database
      - DatabaseSecret
      - RDSProxyRole
      - RDSProxySecurityGroup
    Properties:
      DBProxyName: !Sub '${devEnvironment}-db-proxy'
      EngineFamily: POSTGRESQL
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref DatabaseSecret
          IAMAuth: DISABLED
      RoleArn: !GetAtt RDSProxyRole.Arn
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      VpcSecurityGroupIds:
        - !Ref RDSProxySecurityGroup
      RequireTLS: true
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-db-proxy'

  # RDS Proxy Target Group (production only)
  RDSProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Condition: IsProduction
    DependsOn:
      - RDSProxy
      - Database
    Properties:
      DBProxyName: !Ref RDSProxy
      TargetGroupName: default
      DBClusterIdentifiers: []
      DBInstanceIdentifiers:
        - !Ref Database
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: 100
        MaxIdleConnectionsPercent: 50
        ConnectionBorrowTimeout: 120
        SessionPinningFilters: []
        InitQuery: ''

  # Key pair for bastion (production only; private key stored in SSM at /ec2/keypair/{KeyPairId})
  BastionKeyPair:
    Type: AWS::EC2::KeyPair
    Condition: IsProduction
    Properties:
      KeyName: !Sub '${AWS::StackName}-bastion-key'
      KeyType: rsa
      KeyFormat: pem

  # Security group for bastion host (production only; SSH from anywhere for pipeline)
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsProduction
    Properties:
      GroupDescription: Security group for bastion host (SSH tunnel for migrations)
      VpcId: !Ref WebScraperVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH from pipeline runners
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref RDSSecurityGroup
          Description: Allow PostgreSQL access to RDS
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (e.g. package updates)
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-bastion-sg'

  # Allow bastion to connect to RDS (production only)
  BastionToRDSIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProduction
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref BastionSecurityGroup
      Description: Allow PostgreSQL access from bastion

  # Bastion host for SSH tunnel (production only; run migrations via tunnel from pipeline)
  BastionHost:
    Type: AWS::EC2::Instance
    Condition: IsProduction
    DependsOn:
      - BastionKeyPair
      - BastionSecurityGroup
      - BastionToRDSIngressRule
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
      InstanceType: t4g.nano
      KeyName: !Sub '${AWS::StackName}-bastion-key'
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnet1
          GroupSet:
            - !Ref BastionSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${devEnvironment}-bastion'

  ChromiumLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      Description: Chromium with Node.js integration for AWS Lambda
      ContentUri: ../../../layers/chromium
      CompatibleRuntimes:
        - &nodejsRuntime nodejs22.x
      CompatibleArchitectures:
        - &chromiumArch arm64
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: makefile
      BuildArchitecture: *chromiumArch

  # Dead-letter queue for Ropewiki page processing (messages received 5 times)
  RopewikiPageProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${devEnvironment}-ropewiki-page-processing-dlq'
      MessageRetentionPeriod: 1209600  # 14 days

  # Allow source queue to send messages to the DLQ when redrive policy triggers
  RopewikiPageProcessingDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RopewikiPageProcessingDLQ
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt RopewikiPageProcessingDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt RopewikiPageProcessingQueue.Arn

  # SQS Queue for Ropewiki page processing
  RopewikiPageProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${devEnvironment}-ropewiki-page-processing-queue'
      VisibilityTimeout: 960
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 5
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RopewikiPageProcessingDLQ.Arn
        maxReceiveCount: 5

  # Dead-letter queue for map data processing (messages received 5 times)
  MapDataProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${devEnvironment}-map-data-processing-dlq'
      MessageRetentionPeriod: 1209600  # 14 days

  # Allow source queue to send messages to the DLQ when redrive policy triggers
  MapDataProcessingDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MapDataProcessingDLQ
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt MapDataProcessingDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt MapDataProcessingQueue.Arn

  # SQS Queue for map data processing
  MapDataProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${devEnvironment}-map-data-processing-queue'
      VisibilityTimeout: 960
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 5
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MapDataProcessingDLQ.Arn
        maxReceiveCount: 5

  # S3 Bucket for storing map data files
  MapDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${devEnvironment}-map-data-bucket'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Allow CloudFront to read from MapDataBucket when CloudFront distribution ARN is set (avoids API stack needing S3 permissions)
  MapDataBucketCloudFrontPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasCloudFrontDistribution
    Properties:
      Bucket: !Ref MapDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${MapDataBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Ref CloudFrontDistributionArn

  # S3 Bucket for OpenAPI/Redoc documentation (uploaded by pipeline)
  DocsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'webscraper-${devEnvironment}-api-docs'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DocsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowApiGatewayReadOpenApi
            Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: s3:GetObject
            Resource:
              - !Sub
                - '${BucketArn}/openapi.yaml'
                - BucketArn: !GetAtt DocsBucket.Arn
              - !Sub
                - '${BucketArn}/openapi.json'
                - BucketArn: !GetAtt DocsBucket.Arn
          - !If
            - HasDocsBucketPipelineRole
            - Sid: AllowPipelineUpload
              Effect: Allow
              Principal:
                AWS: !Ref DocsBucketPipelineRoleArn
              Action:
                - s3:ListBucket
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource:
                - !GetAtt DocsBucket.Arn
                - !Sub
                  - '${BucketArn}/*'
                  - BucketArn: !GetAtt DocsBucket.Arn
            - !Ref AWS::NoValue
          - !If
            - HasCloudFrontDistribution
            - Sid: AllowCloudFrontOAC
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub '${DocsBucket.Arn}/*'
              Condition:
                StringEquals:
                  AWS:SourceArn: !Ref CloudFrontDistributionArn
            - !Ref AWS::NoValue

  # Lambda function that scrapes ALL Ropewiki pages and stores them in the database
  RopewikiScraper:
    $ref: lambdas/RopewikiScraper.yaml

  # Lambda function that processes individual Ropewiki pages
  RopewikiPageProcessor:
    $ref: lambdas/RopewikiPageProcessor.yaml

  # Lambda function that processes map data (KML to MBTiles conversion)
  MapDataProcessor:
    $ref: lambdas/MapDataProcessor.yaml

  # Lambda function that reprocesses Ropewiki routes (on-demand invoke)
  RopewikiRouteReprocessor:
    $ref: lambdas/RopewikiRouteReprocessor.yaml

  # Lambda for GET /routes API endpoint
  GetRoutes:
    $ref: lambdas/GetRoutes.yaml

  # Lambda for GET /route/{routeId}/preview API endpoint
  GetRoutePreview:
    $ref: lambdas/GetRoutePreview.yaml

  # --- Generate route marker tiles daily job (ECS Fargate + Tippecanoe) ---
  GenerateRouteMarkerTilesRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${devEnvironment}-generate-route-marker-tiles'
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 2 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":2},"action":{"type":"expire"}}]}
      ImageTagMutability: MUTABLE
      EmptyOnDelete: true

  GenerateRouteMarkerTilesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  GenerateRouteMarkerTilesTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3MapDataWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub '${MapDataBucket.Arn}/pmtiles/*'
        - !If
          - HasCloudFrontDistribution
          - PolicyName: CloudFrontInvalidation
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: cloudfront:CreateInvalidation
                  Resource: !Ref CloudFrontDistributionArn
          - !Ref AWS::NoValue

  GenerateRouteMarkerTilesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${devEnvironment}-generate-route-marker-tiles'
      RetentionInDays: 30

  GenerateRouteMarkerTilesTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${devEnvironment}-generate-route-marker-tiles'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt GenerateRouteMarkerTilesExecutionRole.Arn
      TaskRoleArn: !GetAtt GenerateRouteMarkerTilesTaskRole.Arn
      ContainerDefinitions:
        - Name: generate-route-marker-tiles
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${GenerateRouteMarkerTilesRepository}:latest'
          Essential: true
          Environment:
            - Name: DEV_ENVIRONMENT
              Value: !Ref devEnvironment
            - Name: DB_HOST
              Value: !If [IsProduction, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
            - Name: DB_PORT
              Value: !GetAtt Database.Endpoint.Port
            - Name: DB_NAME
              Value: !Sub '${devEnvironment}db'
            - Name: DB_USER
              Value: !Ref DatabaseUsername
            - Name: DB_PASSWORD
              Value: !Ref DatabasePassword
            - Name: MAP_DATA_BUCKET_NAME
              Value: !Ref MapDataBucket
            - Name: CLOUDFRONT_DISTRIBUTION_ARN
              Value: !If [HasCloudFrontDistribution, !Ref CloudFrontDistributionArn, '']
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref GenerateRouteMarkerTilesLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  GenerateRouteMarkerTilesEventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunGenerateRouteMarkerTilesTask
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !GetAtt GenerateRouteMarkerTilesTaskDefinition.TaskDefinitionArn
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt GenerateRouteMarkerTilesExecutionRole.Arn
                  - !GetAtt GenerateRouteMarkerTilesTaskRole.Arn
                Condition:
                  StringLike:
                    iam:PassedToService: ecs-tasks.amazonaws.com

  GenerateRouteMarkerTilesScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${devEnvironment}-generate-route-marker-tiles-daily'
      Description: Run generate route marker tiles job once per day at noon UTC
      ScheduleExpression: cron(0 12 * * ? *)
      State: ENABLED
      Targets:
        - Id: GenerateRouteMarkerTilesEcsTask
          Arn: !GetAtt EcsCluster.Arn
          RoleArn: !GetAtt GenerateRouteMarkerTilesEventBridgeRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref GenerateRouteMarkerTilesTaskDefinition
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets:
                  - !Ref PrivateSubnet1
                  - !Ref PrivateSubnet2
                SecurityGroups:
                  - !Ref LambdaSecurityGroup
                AssignPublicIp: DISABLED

  # Policy granting ECR login and push to Fargate job repos; attached to pipeline execution role (when PipelineExecutionRoleName set) so build-push-fargate-jobs can push images.
  FargateJobsECRPushPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-fargate-ecr-push'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: ecr:GetAuthorizationToken
            Resource: '*'
          - Effect: Allow
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
            Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${GenerateRouteMarkerTilesRepository}'
      Roles:
        !If
          - HasPipelineExecutionRoleName
          - [ !Ref PipelineExecutionRoleName ]
          - !Ref AWS::NoValue

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${devEnvironment}-webscraper'
      ClusterSettings:
        - Name: containerInsights
          Value: disabled

  # IAM role for API Gateway to invoke Lambda (GetRoutes, GetRoutePreview integrations)
  ApiGatewayInvokeLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiLambdas
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt GetRoutes.Arn
                  - !GetAtt GetRoutePreview.Arn
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-apig-invoke-lambda'

  # Allow API Gateway to invoke GetRoutes Lambda (required for REST API integration)
  GetRoutesApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetRoutes
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

  # Allow API Gateway to invoke GetRoutePreview Lambda (required for REST API integration)
  GetRoutePreviewApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetRoutePreview
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

Outputs:
  DocsBucketName:
    Description: S3 bucket for API documentation (OpenAPI/Redoc)
    Value: !Ref DocsBucket
  MapDataBucketName:
    Description: S3 bucket for map data (GeoJSON, vector tiles); pass to API stack for CloudFront
    Value: !Ref MapDataBucket
  MapDataBucketArn:
    Description: ARN of the map data S3 bucket
    Value: !GetAtt MapDataBucket.Arn
  GetRoutesLambdaArn:
    Description: ARN of the GetRoutes Lambda (for OpenAPI integration resolveYamlEnvs)
    Value: !GetAtt GetRoutes.Arn
  GetRoutePreviewLambdaArn:
    Description: ARN of the GetRoutePreview Lambda (for OpenAPI integration resolveYamlEnvs)
    Value: !GetAtt GetRoutePreview.Arn
  ApiGatewayInvokeLambdaRoleArn:
    Description: IAM role ARN for API Gateway to invoke Lambda (for OpenAPI integration resolveYamlEnvs)
    Value: !GetAtt ApiGatewayInvokeLambdaRole.Arn
  DevDatabaseEndpoint:
    Condition: IsDev
    Description: RDS instance endpoint for dev/testing migrations (used by pipeline run-migrations)
    Value: !GetAtt Database.Endpoint.Address
  ProductionDatabaseEndpoint:
    Condition: IsProduction
    Description: RDS instance endpoint for production migrations (used by pipeline run-migrations)
    Value: !GetAtt Database.Endpoint.Address
  BastionPublicIP:
    Condition: IsProduction
    Description: Bastion host public IP for SSH tunnel (production migrations)
    Value: !GetAtt BastionHost.PublicIp
  BastionKeyPairId:
    Condition: IsProduction
    Description: Key pair ID; private key is in SSM at /ec2/keypair/{KeyPairId}
    Value: !GetAtt BastionKeyPair.KeyPairId
  GenerateRouteMarkerTilesRepositoryUri:
    Description: ECR repository URI for the generate route marker tiles job image (build and push with this tag)
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${GenerateRouteMarkerTilesRepository}:latest'
  FargateJobsECRPushPolicyArn:
    Description: "ARN of the managed policy that allows ECR login and push to Fargate job repos. If PipelineExecutionRoleName is not set, attach this policy to the role used by build-push-fargate-jobs. Example: aws iam attach-role-policy --role-name <PipelineExecutionRoleName> --policy-arn <this-value>"
    Value: !Ref FargateJobsECRPushPolicy
  GenerateRouteMarkerTilesEcsClusterName:
    Description: ECS cluster name for the generate route marker tiles scheduled task
    Value: !Ref EcsCluster

# # More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Tracing: Active
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true
