AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda that enqueues all Ropewiki pages for re-parsing to the page processor queue

Resources:
  RopewikiPageReprocessor:
    Type: 'AWS::Serverless::Function'
    Properties:
      Description: Enqueues all non-deleted RopewikiPages to the page processor queue for re-parsing
      Runtime: nodejs22.x
      Architectures:
        - arm64
      CodeUri: ../../
      Handler: src/ropewiki/lambda-handlers/reprocessPagesHandler.reprocessPagesHandler
      MemorySize: 512
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
          - Ref: LambdaSecurityGroup
        SubnetIds:
          - Ref: PrivateSubnet1
      Role:
        'Fn::GetAtt': RopewikiPageReprocessorRole.Arn
      Environment:
        Variables:
          DEV_ENVIRONMENT:
            Ref: devEnvironment
          PROXY_URL:
            Ref: ProxyUrl
          DB_HOST:
            'Fn::If':
              - UseDatabaseProxyInProd
              - 'Fn::GetAtt': RDSProxy.Endpoint
              - 'Fn::GetAtt': Database.Endpoint.Address
          DB_PORT:
            'Fn::GetAtt': Database.Endpoint.Port
          USE_DATABASE_PROXY:
            Ref: UseDatabaseProxy
          DB_NAME:
            'Fn::Sub': '${devEnvironment}db'
          DB_USER:
            Ref: DatabaseUsername
          DB_PASSWORD:
            Ref: DatabasePassword
          ROPEWIKI_PAGE_PROCESSING_QUEUE_URL:
            Ref: RopewikiPageProcessingQueue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: esnext
        Sourcemap: true
        EntryPoints:
          - src/ropewiki/lambda-handlers/reprocessPagesHandler.ts
        External:
          - sharp
          - pdf-lib
          - pdf-to-img
