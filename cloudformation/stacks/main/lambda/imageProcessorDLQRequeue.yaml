AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda that re-queues ImageProcessor DLQ messages to the main queue (runs on schedule)

Resources:
  ImageProcessorDLQRequeue:
    Type: 'AWS::Serverless::Function'
    Properties:
      Description: Receives from ImageProcessor DLQ, sends each message body to ImageProcessorQueue, then deletes from DLQ. Run every 24h to retry transient failures.
      Runtime: nodejs22.x
      Architectures:
        - arm64
      CodeUri: ../../
      Handler: src/image-data/lambda-handlers/dlqRequeueHandler.dlqRequeueHandler
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(24 hours)
            Enabled: true
            Description: Re-queue ImageProcessor DLQ messages to main queue every 24h
      MemorySize: 256
      Timeout: 60
      Role:
        'Fn::GetAtt': ImageProcessorDLQRequeueRole.Arn
      Environment:
        Variables:
          IMAGE_PROCESSOR_DLQ_URL:
            Ref: ImageProcessorDLQ
          IMAGE_PROCESSOR_QUEUE_URL:
            Ref: ImageProcessorQueue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: esnext
        Sourcemap: true
        EntryPoints:
          - src/image-data/lambda-handlers/dlqRequeueHandler.ts
        External:
          - sharp
          - pdf-lib
          - pdf-to-img
