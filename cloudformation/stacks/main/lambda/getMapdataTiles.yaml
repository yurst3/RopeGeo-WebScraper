AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda for GET /mapdata/{mapDataId}/tiles API endpoint (list vector tile keys)

Resources:
  GetMapdataTiles:
    Type: 'AWS::Serverless::Function'
    Properties:
      Description: 'Lambda for GET /mapdata/{mapDataId}/tiles; lists .pbf keys under tiles/{mapDataId}/ in the map data bucket'
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Role:
        'Fn::GetAtt': GetMapdataTilesRole.Arn
      CodeUri: ../../
      Handler: src/api/getMapdataTiles/handler.handler
      MemorySize: 256
      Timeout: 120
      Environment:
        Variables:
          MAP_DATA_BUCKET_NAME:
            Ref: MapDataBucket
          MAP_DATA_PUBLIC_BASE_URL:
            Ref: MapDataPublicBaseUrl
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: esnext
        Sourcemap: true
        EntryPoints:
          - src/api/getMapdataTiles/handler.ts
        External:
          - sharp
          - pdf-lib
          - pdf-to-img
Outputs:
  GetMapdataTilesLambdaArn:
    Description: ARN of the GetMapdataTiles Lambda (for OpenAPI integration resolveYamlEnvs)
    Value:
      'Fn::GetAtt': GetMapdataTiles.Arn
