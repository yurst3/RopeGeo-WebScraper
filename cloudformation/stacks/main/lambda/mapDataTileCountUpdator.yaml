AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda that backfills MapData tileCount and tileTotalBytes from S3 listings

Resources:
  MapDataTileCountUpdator:
    Type: 'AWS::Serverless::Function'
    Properties:
      Description: Lists S3 .pbf tiles per MapData row and updates tileCount / tileTotalBytes in the database
      Runtime: nodejs22.x
      Architectures:
        - arm64
      CodeUri: ../../
      Handler: src/map-data/lambda-handlers/updateMapDataTileCountHandler.updateMapDataTileCountHandler
      MemorySize: 1024
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
          - Ref: LambdaSecurityGroup
        SubnetIds:
          - Ref: PrivateSubnet1
      Role:
        'Fn::GetAtt': MapDataTileCountUpdatorRole.Arn
      Environment:
        Variables:
          DEV_ENVIRONMENT:
            Ref: devEnvironment
          PROXY_URL:
            Ref: ProxyUrl
          DB_HOST:
            'Fn::If':
              - UseDatabaseProxyInProd
              - 'Fn::GetAtt': RDSProxy.Endpoint
              - 'Fn::GetAtt': Database.Endpoint.Address
          DB_PORT:
            'Fn::GetAtt': Database.Endpoint.Port
          USE_DATABASE_PROXY:
            Ref: UseDatabaseProxy
          DB_NAME:
            'Fn::Sub': '${devEnvironment}db'
          DB_USER:
            Ref: DatabaseUsername
          DB_PASSWORD:
            Ref: DatabasePassword
          MAP_DATA_BUCKET_NAME:
            Ref: MapDataBucket
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: esnext
        Sourcemap: true
        EntryPoints:
          - src/map-data/lambda-handlers/updateMapDataTileCountHandler.ts
        External:
          - sharp
          - pdf-lib
          - pdf-to-img
