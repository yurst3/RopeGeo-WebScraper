AWSTemplateFormatVersion: '2010-09-09'
Description: ECS task definition for build download folders Fargate task

Parameters:
  PageZipPublicBaseUrl:
    Type: String
    Description: 'Public base URL for page ZIP downloads (e.g. https://api.webscraper.ropegeo.com/page-zips). Stored in RopewikiPage.downloadFolder.'
    Default: 'https://api.webscraper.ropegeo.com/page-zips'

Resources:
  BuildDownloadFoldersTaskDefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family:
        'Fn::Sub': '${devEnvironment}-build-download-folders'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '1024'
      Memory: '8192'
      ExecutionRoleArn:
        'Fn::GetAtt': BuildDownloadFoldersExecutionRole.Arn
      TaskRoleArn:
        'Fn::GetAtt': BuildDownloadFoldersTaskRole.Arn
      ContainerDefinitions:
        - Name: build-download-folders
          Image:
            'Fn::Sub': '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BuildDownloadFoldersRepository}:latest'
          Essential: true
          Environment:
            - Name: DEV_ENVIRONMENT
              Value:
                Ref: devEnvironment
            - Name: DB_HOST
              Value:
                'Fn::If':
                  - UseDatabaseProxyInProd
                  - 'Fn::GetAtt': RDSProxy.Endpoint
                  - 'Fn::GetAtt': Database.Endpoint.Address
            - Name: DB_PORT
              Value:
                'Fn::GetAtt': Database.Endpoint.Port
            - Name: DB_NAME
              Value:
                'Fn::Sub': '${devEnvironment}db'
            - Name: DB_USER
              Value:
                Ref: DatabaseUsername
            - Name: DB_PASSWORD
              Value:
                Ref: DatabasePassword
            - Name: USE_DATABASE_PROXY
              Value:
                Ref: UseDatabaseProxy
            - Name: PAGE_ZIP_BUCKET_NAME
              Value:
                Ref: PageZipBucket
            - Name: PAGE_ZIP_PUBLIC_BASE_URL
              Value:
                Ref: PageZipPublicBaseUrl
            - Name: MAP_DATA_BUCKET_NAME
              Value:
                Ref: MapDataBucket
            - Name: IMAGE_BUCKET_NAME
              Value:
                Ref: ImageDataBucket
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Ref: BuildDownloadFoldersLogGroup
              awslogs-region:
                Ref: 'AWS::Region'
              awslogs-stream-prefix: ecs
