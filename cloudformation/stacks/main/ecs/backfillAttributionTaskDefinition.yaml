AWSTemplateFormatVersion: '2010-09-09'
Description: ECS task definition for one-shot attribution backfill Fargate task (delete after run)

Resources:
  BackfillAttributionTaskDefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family:
        'Fn::Sub': '${devEnvironment}-backfill-attribution'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn:
        'Fn::GetAtt': BackfillAttributionExecutionRole.Arn
      TaskRoleArn:
        'Fn::GetAtt': BackfillAttributionTaskRole.Arn
      ContainerDefinitions:
        - Name: backfill-attribution
          Image:
            'Fn::Sub': '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BackfillAttributionRepository}:latest'
          Essential: true
          Environment:
            - Name: DEV_ENVIRONMENT
              Value:
                Ref: devEnvironment
            - Name: DB_HOST
              Value:
                'Fn::If':
                  - UseDatabaseProxyInProd
                  - 'Fn::GetAtt': RDSProxy.Endpoint
                  - 'Fn::GetAtt': Database.Endpoint.Address
            - Name: DB_PORT
              Value:
                'Fn::GetAtt': Database.Endpoint.Port
            - Name: DB_NAME
              Value:
                'Fn::Sub': '${devEnvironment}db'
            - Name: DB_USER
              Value:
                Ref: DatabaseUsername
            - Name: DB_PASSWORD
              Value:
                Ref: DatabasePassword
            - Name: USE_DATABASE_PROXY
              Value:
                Ref: UseDatabaseProxy
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Ref: BackfillAttributionLogGroup
              awslogs-region:
                Ref: 'AWS::Region'
              awslogs-stream-prefix: ecs
