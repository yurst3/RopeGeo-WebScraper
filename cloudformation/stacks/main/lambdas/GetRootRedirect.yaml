Type: AWS::Serverless::Function
Properties:
  Description: Lambda for GET / API endpoint; redirects to /docs/index.html
  Runtime: nodejs22.x
  Architectures:
    - arm64
  CodeUri: ../../../
  Handler: src/api/getRootRedirect/handler.handler
  MemorySize: 128
  Timeout: 5
Metadata:
  BuildMethod: esbuild
  BuildProperties:
    Minify: true
    Target: "esnext"
    Sourcemap: true
    EntryPoints:
      - src/api/getRootRedirect/handler.ts
