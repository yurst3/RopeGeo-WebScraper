Type: AWS::Serverless::Function
Properties:
  Description: A Lambda function that scrapes Ropewiki pages and stores them in the database
  Runtime: nodejs22.x
  Architectures:
    - arm64
  CodeUri: ../../../
  Handler: src/ropewiki/lambda-handlers/mainHandler.mainHandler
  # This property associates this Lambda function with a scheduled CloudWatch Event. For all available properties, see
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#schedule
  # This runs every night at midnight UTC.
  Events:
    CloudWatchEvent:
      Type: Schedule
      Properties:
        Schedule: cron(0 0 * * ? *)
        Input: '{"processPages": true, "processRoutes": true}'
  MemorySize: 1024
  Timeout: 900
  VpcConfig:
    SecurityGroupIds:
      - !Ref LambdaSecurityGroup
    SubnetIds:
      - !Ref PrivateSubnet1
  Environment:
    Variables:
      DEV_ENVIRONMENT: !Ref devEnvironment
      PROXY_URL: !Ref ProxyUrl
      DB_HOST: !If [UseDatabaseProxyInProd, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
      DB_PORT: !GetAtt Database.Endpoint.Port
      USE_DATABASE_PROXY: !Ref UseDatabaseProxy
      DB_NAME: !Sub '${devEnvironment}db'
      DB_USER: !Ref DatabaseUsername
      DB_PASSWORD: !Ref DatabasePassword
      ROPEWIKI_PAGE_PROCESSING_QUEUE_URL: !Ref RopewikiPageProcessingQueue
      MAP_DATA_PROCESSING_QUEUE_URL: !Ref MapDataProcessingQueue
  Policies:
    - SQSSendMessagePolicy:
        QueueName: !GetAtt RopewikiPageProcessingQueue.QueueName
    - SQSSendMessagePolicy:
        QueueName: !GetAtt MapDataProcessingQueue.QueueName
Metadata: # Manage esbuild properties
  BuildMethod: esbuild
  BuildProperties:
    Minify: true
    Target: "esnext"
    Sourcemap: true
    EntryPoints:
    - src/ropewiki/lambda-handlers/mainHandler.ts
    External:
    - "@sparticuz/chromium"
