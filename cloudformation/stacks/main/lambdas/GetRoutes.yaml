Type: AWS::Serverless::Function
Properties:
  Description: Lambda for GET /routes API endpoint; returns all routes from the database
  Runtime: nodejs22.x
  Architectures:
    - arm64
  CodeUri: ../../../
  Handler: src/api/getRoutes/handler.handler
  MemorySize: 256
  Timeout: 30
  VpcConfig:
    SecurityGroupIds:
      - !Ref LambdaSecurityGroup
    SubnetIds:
      - !Ref PrivateSubnet1
  Environment:
    Variables:
      DEV_ENVIRONMENT: !Ref devEnvironment
      DB_HOST: !If [UseDatabaseProxyInProd, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
      DB_PORT: !GetAtt Database.Endpoint.Port
      USE_DATABASE_PROXY: !Ref UseDatabaseProxy
      DB_NAME: !Sub '${devEnvironment}db'
      DB_USER: !Ref DatabaseUsername
      DB_PASSWORD: !Ref DatabasePassword
Metadata:
  BuildMethod: esbuild
  BuildProperties:
    Minify: true
    Target: "esnext"
    Sourcemap: true
    EntryPoints:
      - src/api/getRoutes/handler.ts
