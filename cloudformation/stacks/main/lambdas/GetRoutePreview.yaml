Type: AWS::Serverless::Function
Properties:
  Description: Lambda for GET /route/{routeId}/preview API endpoint; returns page previews for the route
  Runtime: nodejs22.x
  Architectures:
    - arm64
  CodeUri: ../../../
  Handler: src/api/getRoutePreview/handler.handler
  MemorySize: 256
  Timeout: 30
  VpcConfig:
    SecurityGroupIds:
      - !Ref LambdaSecurityGroup
    SubnetIds:
      - !Ref PrivateSubnet1
  Environment:
    Variables:
      DEV_ENVIRONMENT: !Ref devEnvironment
      DB_HOST: !If [IsProduction, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
      DB_PORT: !GetAtt Database.Endpoint.Port
      DB_NAME: !Sub '${devEnvironment}db'
      DB_USER: !Ref DatabaseUsername
      DB_PASSWORD: !Ref DatabasePassword
Metadata:
  BuildMethod: esbuild
  BuildProperties:
    Minify: true
    Target: "esnext"
    Sourcemap: true
    EntryPoints:
      - src/api/getRoutePreview/handler.ts
