Type: AWS::Serverless::Function
Properties:
  Description: A Lambda function that processes individual Ropewiki pages (beta sections and images)
  Runtime: nodejs22.x
  Architectures:
    - *chromiumArch
  CodeUri: ../../../
  Layers:
    - !Ref ChromiumLayer
  Handler: src/ropewiki/lambda-handlers/processPageHandler.processPageHandler
  Events:
    SQSEvent:
      Type: SQS
      Properties:
        Queue: !GetAtt RopewikiPageProcessingQueue.Arn
        BatchSize: 10
  MemorySize: 1024
  Timeout: 900
  VpcConfig:
    SecurityGroupIds:
      - !Ref LambdaSecurityGroup
    SubnetIds:
      - !Ref PrivateSubnet1
  Environment:
    Variables:
      DEV_ENVIRONMENT: !Ref devEnvironment
      PROXY_URL: !Ref ProxyUrl
      DB_HOST: !If [IsProduction, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]
      DB_PORT: !GetAtt Database.Endpoint.Port
      DB_NAME: !Sub '${devEnvironment}db'
      DB_USER: !Ref DatabaseUsername
      DB_PASSWORD: !Ref DatabasePassword
      ROPEWIKI_PAGE_PROCESSING_QUEUE_URL: !Ref RopewikiPageProcessingQueue
      ROPEWIKI_PAGE_PROCESSOR_TIMEOUT_SECONDS: "900"
  Policies:
    - Version: '2012-10-17'
      Statement:
        - Effect: Allow
          Action:
            - sqs:ChangeMessageVisibility
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - sqs:ReceiveMessage
          Resource: !GetAtt RopewikiPageProcessingQueue.Arn
Metadata: # Manage esbuild properties
  BuildMethod: esbuild
  BuildProperties:
    Minify: true
    Target: "esnext"
    Sourcemap: true
    EntryPoints:
    - src/ropewiki/lambda-handlers/processPageHandler.ts
    External:
    - "@sparticuz/chromium"
