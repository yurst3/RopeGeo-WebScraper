AWSTemplateFormatVersion: '2010-09-09'
Description: ECR repositories for Fargate task images

Resources:
  GenerateTrailTilesRepository:
    Type: 'AWS::ECR::Repository'
    Properties:
      RepositoryName:
        'Fn::Sub': '${devEnvironment}-generate-trail-tiles'
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 2 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":2},"action":{"type":"expire"}}]}
      ImageTagMutability: MUTABLE
      EmptyOnDelete: true
  BuildDownloadFoldersRepository:
    Type: 'AWS::ECR::Repository'
    Properties:
      RepositoryName:
        'Fn::Sub': '${devEnvironment}-build-download-folders'
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 2 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":2},"action":{"type":"expire"}}]}
      ImageTagMutability: MUTABLE
      EmptyOnDelete: true
  BackfillAttributionRepository:
    Type: 'AWS::ECR::Repository'
    Properties:
      RepositoryName:
        'Fn::Sub': '${devEnvironment}-backfill-attribution'
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 2 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":2},"action":{"type":"expire"}}]}
      ImageTagMutability: MUTABLE
      EmptyOnDelete: true
Outputs:
  GenerateTrailTilesRepositoryUri:
    Description: ECR repository URI for the generate trail tiles task image (build and push with this tag)
    Value:
      'Fn::Sub': '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${GenerateTrailTilesRepository}:latest'
  BuildDownloadFoldersRepositoryUri:
    Description: ECR repository URI for the build download folders task image
    Value:
      'Fn::Sub': '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BuildDownloadFoldersRepository}:latest'
  BackfillAttributionRepositoryUri:
    Description: ECR repository URI for the one-shot attribution backfill task image (delete after run)
    Value:
      'Fn::Sub': '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BackfillAttributionRepository}:latest'
