AWSTemplateFormatVersion: '2010-09-09'
Description: IAM roles for Fargate tasks (task role, execution role, EventBridge role per task)

Resources:
  GenerateTrailTilesTaskRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'Fn::If':
            - HasRdsDbiResourceId
            - Ref: RdsIamAuthPolicy
            - Ref: 'AWS::NoValue'
        - Ref: S3MapDataBucketPolicy
        - 'Fn::If':
            - HasCloudFrontDistribution
            - Ref: CloudFrontInvalidationPolicy
            - Ref: 'AWS::NoValue'
  GenerateTrailTilesExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
  GenerateTrailTilesEventBridgeRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: RunGenerateTrailTilesTask
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'ecs:RunTask'
                Resource:
                  'Fn::GetAtt': GenerateTrailTilesTaskDefinition.TaskDefinitionArn
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource:
                  - 'Fn::GetAtt': GenerateTrailTilesExecutionRole.Arn
                  - 'Fn::GetAtt': GenerateTrailTilesTaskRole.Arn
                Condition:
                  StringLike:
                    'iam:PassedToService': ecs-tasks.amazonaws.com
