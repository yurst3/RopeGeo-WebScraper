AWSTemplateFormatVersion: '2010-09-09'
Description: IAM roles for Lambda functions

Resources:
  GetRoutesRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - Ref: LambdaExecutionPolicy
        - 'Fn::If':
            - HasRdsDbiResourceId
            - Ref: RdsIamAuthPolicy
            - Ref: 'AWS::NoValue'
