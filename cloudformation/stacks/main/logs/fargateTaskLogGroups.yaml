AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Logs log groups for Fargate tasks

Resources:
  GenerateTrailTilesLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName:
        'Fn::Sub': '/ecs/${devEnvironment}-generate-trail-tiles'
      RetentionInDays: 30
  BuildDownloadFoldersLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName:
        'Fn::Sub': '/ecs/${devEnvironment}-build-download-folders'
      RetentionInDays: 30
  BackfillAttributionLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName:
        'Fn::Sub': '/ecs/${devEnvironment}-backfill-attribution'
      RetentionInDays: 30
