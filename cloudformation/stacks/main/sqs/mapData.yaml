AWSTemplateFormatVersion: '2010-09-09'
Description: SQS queues for map data processing

Resources:
  MapDataProcessingDLQ:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName:
        'Fn::Sub': '${devEnvironment}-map-data-processing-dlq'
      MessageRetentionPeriod: 1209600
  MapDataProcessingDLQPolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - Ref: MapDataProcessingDLQ
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action: 'sqs:SendMessage'
            Resource:
              'Fn::GetAtt': MapDataProcessingDLQ.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn':
                  'Fn::GetAtt': MapDataProcessingQueue.Arn
  MapDataProcessingQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName:
        'Fn::Sub': '${devEnvironment}-map-data-processing-queue'
      VisibilityTimeout: 960
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 5
      RedrivePolicy:
        deadLetterTargetArn:
          'Fn::GetAtt': MapDataProcessingDLQ.Arn
        maxReceiveCount: 5
