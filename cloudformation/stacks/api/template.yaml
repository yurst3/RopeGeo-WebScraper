AWSTemplateFormatVersion: 2010-09-09
Description: WebScraper HTTP API and CloudFront (OpenAPI from docs bucket)

Parameters:
  DocsBucketName:
    Type: String
    Description: Name of the S3 bucket containing openapiResolved.yaml (output from main stack DocsBucketName)
  MapDataBucketName:
    Type: String
    Description: Name of the S3 bucket for map data (output from main stack MapDataBucketName). Required when using CloudFront.
  CustomDomainName:
    Type: String
    Default: api.webscraper.ropegeo.com
    Description: Custom domain for CloudFront (e.g. api.webscraper.ropegeo.com). Leave blank to skip custom domain.
  CloudFrontCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for CustomDomainName. Must be in us-east-1 for CloudFront. Required if CustomDomainName is set.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainName, '']]
  HasCertificate: !Not [!Equals [!Ref CloudFrontCertificateArn, '']]
  CreateCloudFrontWithDomain: !And [!Condition HasCustomDomain, !Condition HasCertificate]

Resources:
  WebScraperApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      BodyS3Location:
        Bucket: !Ref DocsBucketName
        Key: openapiResolved.yaml

  WebScraperApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebScraperApi
      StageName: $default
      AutoDeploy: true
      Description: Default stage for WebScraper HTTP API

  # Origin Access Control for S3 origins (recommended over OAI)
  WebScraperOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Function to strip /docs prefix so S3 receives requests at root (e.g. /docs/index.html -> /index.html)
  StripDocsPrefixFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-strip-docs-prefix'
      AutoPublish: true
      FunctionConfig:
        Comment: Strip /docs prefix for docs bucket origin
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri && request.uri.indexOf('/docs/') === 0) {
            request.uri = request.uri.replace(/^\/docs\//, '/');
          }
          return request;
        }

  # CloudFront Function: strip /mapdata prefix so S3 receives e.g. /mapdata/geojson/id.geojson -> /geojson/id.geojson
  StripMapDataPrefixFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-strip-mapdata-prefix'
      AutoPublish: true
      FunctionConfig:
        Comment: Strip /mapdata prefix for map data bucket origin
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri && request.uri.indexOf('/mapdata/') === 0) {
            request.uri = request.uri.replace(/^\/mapdata\//, '/');
          }
          return request;
        }

  # CloudFront Function: only exact root (/) redirects to /docs/index.html; no other root-level paths serve docs
  RootRedirectFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-root-redirect'
      AutoPublish: true
      FunctionConfig:
        Comment: Redirect / to /docs/index.html; other paths fall through to default (404)
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri === '/' || request.uri === '') {
            return {
              statusCode: 302,
              statusDescription: 'Found',
              headers: {
                location: { value: '/docs/index.html' }
              }
            };
          }
          return request;
        }

  WebScraperDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - WebScraperApiStage
    Properties:
      DistributionConfig:
        Comment: WebScraper API, docs and map data
        Enabled: true
        DefaultRootObject: ''
        Aliases: !If [CreateCloudFrontWithDomain, [!Ref CustomDomainName], []]
        ViewerCertificate: !If
          - CreateCloudFrontWithDomain
          - AcmCertificateArn: !Ref CloudFrontCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
            CloudFrontDefaultCertificate: false
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: MapDataBucket
            DomainName: !Sub '${MapDataBucketName}.s3.${AWS::Region}.amazonaws.com'
            OriginAccessControlId: !GetAtt WebScraperOAC.Id
            S3OriginConfig: {}
          - Id: DocsBucket
            DomainName: !Sub '${DocsBucketName}.s3.${AWS::Region}.amazonaws.com'
            OriginAccessControlId: !GetAtt WebScraperOAC.Id
            S3OriginConfig: {}
          - Id: WebScraperApi
            DomainName: !Sub '${WebScraperApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: WebScraperApi
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
        CacheBehaviors:
          - PathPattern: /
            TargetOriginId: DocsBucket
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt RootRedirectFunction.FunctionARN
          - PathPattern: /mapdata/*
            TargetOriginId: MapDataBucket
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt StripMapDataPrefixFunction.FunctionARN
          - PathPattern: /docs/*
            TargetOriginId: DocsBucket
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt StripDocsPrefixFunction.FunctionARN

  # Allow CloudFront to read from MapDataBucket (only policy on this bucket; no public access)
  MapDataBucketCloudFrontPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MapDataBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${MapDataBucketName}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebScraperDistribution}'

Outputs:
  WebScraperApiEndpoint:
    Description: Default endpoint for the WebScraper HTTP API (use via CloudFront in production)
    Value: !GetAtt WebScraperApi.ApiEndpoint
  WebScraperApiId:
    Description: API ID for the WebScraper HTTP API
    Value: !Ref WebScraperApi
  WebScraperApiStageName:
    Description: Stage name for the WebScraper HTTP API
    Value: !Ref WebScraperApiStage
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref WebScraperDistribution
  CloudFrontDistributionArn:
    Description: CloudFront distribution ARN (pass to main stack CloudFrontDistributionArn to allow Docs bucket access)
    Value: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebScraperDistribution}'
  CloudFrontDomainName:
    Description: CloudFront distribution domain (e.g. for CNAME or Route 53 alias)
    Value: !GetAtt WebScraperDistribution.DomainName
  CloudFrontHostedZoneId:
    Description: CloudFront hosted zone ID (for Route 53 alias target)
    Value: Z2FDTNDATAQYW2
  CloudFrontUrl:
    Description: Base URL for API/docs/map data via CloudFront (use this as the public API URL)
    Value: !Sub 'https://${WebScraperDistribution.DomainName}'
  CloudFrontCustomDomainUrl:
    Condition: CreateCloudFrontWithDomain
    Description: Public URL for the custom domain (point DNS here)
    Value: !Sub 'https://${CustomDomainName}'
