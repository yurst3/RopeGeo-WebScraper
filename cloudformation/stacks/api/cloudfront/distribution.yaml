AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distribution, OAC, and viewer-request functions

Resources:
  WebScraperOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          'Fn::Sub': '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  StripDocsPrefixFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name:
        'Fn::Sub': '${AWS::StackName}-strip-docs-prefix'
      AutoPublish: true
      FunctionConfig:
        Comment: Strip /docs prefix for docs bucket origin
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri && request.uri.indexOf('/docs/') === 0) {
            request.uri = request.uri.replace(/^\/docs\//, '/');
          }
          return request;
        }

  StripMapDataPrefixFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name:
        'Fn::Sub': '${AWS::StackName}-strip-mapdata-prefix'
      AutoPublish: true
      FunctionConfig:
        Comment: Strip /mapdata prefix for map data bucket origin
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri && request.uri.indexOf('/mapdata/') === 0) {
            request.uri = request.uri.replace(/^\/mapdata\//, '/');
          }
          return request;
        }

  StripImagesPrefixFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name:
        'Fn::Sub': '${AWS::StackName}-strip-images-prefix'
      AutoPublish: true
      FunctionConfig:
        Comment: Strip /images prefix for image data bucket origin
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri && request.uri.indexOf('/images/') === 0) {
            request.uri = request.uri.replace(/^\/images\//, '/');
          }
          return request;
        }

  RootRedirectFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name:
        'Fn::Sub': '${AWS::StackName}-root-redirect'
      AutoPublish: true
      FunctionConfig:
        Comment: Redirect / to /docs/index.html; other paths fall through to default (404)
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri === '/' || request.uri === '') {
            return {
              statusCode: 302,
              statusDescription: 'Found',
              headers: {
                location: { value: '/docs/index.html' }
              }
            };
          }
          return request;
        }

  WebScraperDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - WebScraperApiStage
    Properties:
      DistributionConfig:
        Comment: WebScraper API, docs and map data
        Enabled: true
        DefaultRootObject: ''
        Aliases:
          'Fn::If':
            - CreateCloudFrontWithDomain
            - - Ref: CustomDomainName
            - []
        ViewerCertificate:
          'Fn::If':
            - CreateCloudFrontWithDomain
            - AcmCertificateArn:
                Ref: CloudFrontCertificateArn
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.2_2021
            - CloudFrontDefaultCertificate: true
        Origins:
          'Fn::If':
            - HasImageDataBucket
            - - Id: MapDataBucket
                DomainName:
                  'Fn::Sub': '${MapDataBucketName}.s3.${AWS::Region}.amazonaws.com'
                OriginAccessControlId:
                  'Fn::GetAtt': [WebScraperOAC, Id]
                S3OriginConfig: {}
              - Id: DocsBucket
                DomainName:
                  'Fn::Sub': '${DocsBucketName}.s3.${AWS::Region}.amazonaws.com'
                OriginAccessControlId:
                  'Fn::GetAtt': [WebScraperOAC, Id]
                S3OriginConfig: {}
              - Id: ImageDataBucket
                DomainName:
                  'Fn::Sub': '${ImageDataBucketName}.s3.${AWS::Region}.amazonaws.com'
                OriginAccessControlId:
                  'Fn::GetAtt': [WebScraperOAC, Id]
                S3OriginConfig: {}
              - Id: WebScraperApi
                DomainName:
                  'Fn::Sub': '${WebScraperApi}.execute-api.${AWS::Region}.amazonaws.com'
                CustomOriginConfig:
                  HTTPSPort: 443
                  OriginProtocolPolicy: https-only
                  OriginSSLProtocols:
                    - TLSv1.2
            - - Id: MapDataBucket
                DomainName:
                  'Fn::Sub': '${MapDataBucketName}.s3.${AWS::Region}.amazonaws.com'
                OriginAccessControlId:
                  'Fn::GetAtt': [WebScraperOAC, Id]
                S3OriginConfig: {}
              - Id: DocsBucket
                DomainName:
                  'Fn::Sub': '${DocsBucketName}.s3.${AWS::Region}.amazonaws.com'
                OriginAccessControlId:
                  'Fn::GetAtt': [WebScraperOAC, Id]
                S3OriginConfig: {}
              - Id: WebScraperApi
                DomainName:
                  'Fn::Sub': '${WebScraperApi}.execute-api.${AWS::Region}.amazonaws.com'
                CustomOriginConfig:
                  HTTPSPort: 443
                  OriginProtocolPolicy: https-only
                  OriginSSLProtocols:
                    - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: WebScraperApi
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          # Forward query strings to API Gateway (CachingDisabled does not). Use AllViewerExceptHostHeader
          # so API Gateway receives the origin Host header, not the viewer's.
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        CacheBehaviors:
          'Fn::If':
            - HasImageDataBucket
            - - PathPattern: /
                TargetOriginId: DocsBucket
                ViewerProtocolPolicy: redirect-to-https
                AllowedMethods:
                  - GET
                  - HEAD
                CachedMethods:
                  - GET
                  - HEAD
                Compress: true
                CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN:
                      'Fn::GetAtt': [RootRedirectFunction, FunctionARN]
              - PathPattern: /mapdata/*
                TargetOriginId: MapDataBucket
                ViewerProtocolPolicy: redirect-to-https
                AllowedMethods:
                  - GET
                  - HEAD
                CachedMethods:
                  - GET
                  - HEAD
                Compress: true
                CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN:
                      'Fn::GetAtt': [StripMapDataPrefixFunction, FunctionARN]
              - PathPattern: /images/*
                TargetOriginId: ImageDataBucket
                ViewerProtocolPolicy: redirect-to-https
                AllowedMethods:
                  - GET
                  - HEAD
                CachedMethods:
                  - GET
                  - HEAD
                Compress: true
                CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN:
                      'Fn::GetAtt': [StripImagesPrefixFunction, FunctionARN]
              - PathPattern: /docs/*
                TargetOriginId: DocsBucket
                ViewerProtocolPolicy: redirect-to-https
                AllowedMethods:
                  - GET
                  - HEAD
                CachedMethods:
                  - GET
                  - HEAD
                Compress: true
                CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN:
                      'Fn::GetAtt': [StripDocsPrefixFunction, FunctionARN]
            - - PathPattern: /
                TargetOriginId: DocsBucket
                ViewerProtocolPolicy: redirect-to-https
                AllowedMethods:
                  - GET
                  - HEAD
                CachedMethods:
                  - GET
                  - HEAD
                Compress: true
                CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN:
                      'Fn::GetAtt': [RootRedirectFunction, FunctionARN]
              - PathPattern: /mapdata/*
                TargetOriginId: MapDataBucket
                ViewerProtocolPolicy: redirect-to-https
                AllowedMethods:
                  - GET
                  - HEAD
                CachedMethods:
                  - GET
                  - HEAD
                Compress: true
                CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN:
                      'Fn::GetAtt': [StripMapDataPrefixFunction, FunctionARN]
              - PathPattern: /docs/*
                TargetOriginId: DocsBucket
                ViewerProtocolPolicy: redirect-to-https
                AllowedMethods:
                  - GET
                  - HEAD
                CachedMethods:
                  - GET
                  - HEAD
                Compress: true
                CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN:
                      'Fn::GetAtt': [StripDocsPrefixFunction, FunctionARN]

Outputs:
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value:
      Ref: WebScraperDistribution
  CloudFrontDistributionArn:
    Description: CloudFront distribution ARN (pass to main stack CloudFrontDistributionArn to allow Docs bucket access)
    Value:
      'Fn::Sub': 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebScraperDistribution}'
  CloudFrontDomainName:
    Description: CloudFront distribution domain (e.g. for CNAME or Route 53 alias)
    Value:
      'Fn::GetAtt': [WebScraperDistribution, DomainName]
  CloudFrontHostedZoneId:
    Description: CloudFront hosted zone ID (for Route 53 alias target)
    Value: Z2FDTNDATAQYW2
  CloudFrontUrl:
    Description: Base URL for API/docs/map data via CloudFront (use this as the public API URL)
    Value:
      'Fn::Sub': 'https://${WebScraperDistribution.DomainName}'
  CloudFrontCustomDomainUrl:
    Condition: CreateCloudFrontWithDomain
    Description: Public URL for the custom domain (point DNS here)
    Value:
      'Fn::Sub': 'https://${CustomDomainName}'
